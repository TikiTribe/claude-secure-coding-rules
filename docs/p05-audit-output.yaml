      Top 10 2025 category mismatches across three rules.

      ISSUE 1 — disable_log_requests removed in vLLM 0.6.x (BLOCKING)
        The parameter disable_log_requests=True is passed to the LLM() constructor in
        four places (lines 33, 118, 392, and the Don't example at line 77) as a privacy
        control against logging sensitive prompts. This kwarg was removed from EngineArgs
        and AsyncEngineArgs in vLLM 0.6.x (GitHub issues #9708 and #23283 confirm
        TypeError at runtime). Passing it to LLM() fails with an unexpected keyword
        argument error. The correct approach for 0.6.x is the CLI flag
        --disable-log-requests or the environment variable VLLM_DISABLE_LOG_REQUESTS=1.
        Fix required: remove the constructor kwarg from all Do examples and add the
        env-var/CLI approach for the OpenAI-compatible server path.

      ISSUE 2 — from vllm.config import CacheConfig is a dead import (BLOCKING)
        Line 96 imports CacheConfig from vllm.config but the symbol is never referenced
        anywhere in the file. In vLLM 0.6.x the config submodule was reorganised and
        CacheConfig is not guaranteed to be importable from vllm.config on all 0.6.x
        patch releases. The import misleads practitioners and may raise ImportError.
        Fix required: remove the unused import line.

      ISSUE 3 — @validator is Pydantic v1 syntax; silently inert under Pydantic v2 (BLOCKING)
        The FastAPI API-security Do example uses @validator("prompt") (line 376), which
        is Pydantic v1. With FastAPI >= 0.100.0 and Pydantic v2 (the current default),
        @validator is not invoked during model validation — the prompt injection-pattern
        check disappears silently with no error or warning. The correct Pydantic v2
        syntax is @field_validator("prompt", mode="before"). Because the validator's
        purpose is injection detection, its silent failure is a security defect.
        Fix required: replace @validator with @field_validator and add field_validator
        to the pydantic import line.

      ISSUE 4 — OWASP LLM Top 10 2025 category mismatches across three rules (BLOCKING)
        The file references 2024-edition LLM category numbers that map to different
        risks in the 2025 edition:
