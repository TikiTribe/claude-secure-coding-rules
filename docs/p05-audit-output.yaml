        All OWASP LLM refs appear without year: OWASP LLM01, LLM02, LLM04, LLM07, LLM08.
        Other files in this repo use OWASP LLM01:2025. Category numbering differs between
        the 2023 v1.1 and 2025 v2.0 lists; ambiguity is not purely cosmetic.
        Fix required: append :2025 to all OWASP LLM ref numbers.

