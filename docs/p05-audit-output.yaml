      - TypeNameHandling.All in Don't example is correct and actively dangerous.
      - EF Core LINQ and Dapper @params in Do examples are syntactically correct.
      - IExceptionHandler in error handling Do example is correct for ASP.NET Core 8+.
      - All CWE IDs and OWASP 2025 category citations are valid.

