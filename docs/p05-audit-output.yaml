audited_rules:
  - path: rules/_core/owasp-2025.md
    status: passed
    reviewed_by: rocklambros
    reviewed_on: 2026-05-25
    notes: |
      Audited all 10 rules (one per A01-A10 category, with A01 containing two rules).
      11 rule sections checked in total. Four distinct issues found:

      ISSUE 1 — A01 SSRF rule: logic bug in Do example (CRITICAL)
        The validate_url() function checks whether parsed.hostname is a private/loopback IP,
        but the exception it raises (ValueError) is caught by the same except clause that
        handles "not an IP literal" cases. The line `raise ValueError("Internal addresses
        blocked")` inside the try block is silently swallowed by `except ValueError: pass`,
        making the private-IP guard a no-op. An attacker supplying a private IP literal
        (e.g. http://192.168.1.1) passes the allowlist check (it is not in ALLOWED_HOSTS,
        so validate_url raises ValueError("Host not allowed") before reaching the IP check)
        but an IP-literal that IS allowlisted would bypass the private-IP guard entirely.
        Additionally the allowlist-first design does not defend against DNS rebinding: an
        allowlisted FQDN could resolve to an internal address at fetch time because no
        post-resolution IP check is performed.
        Fix required: restructure the IP-literal check so its ValueError is not caught by
        the hostname-parsing except; add a post-DNS-resolution IP check via socket.getaddrinfo.

      ISSUE 2 — A04 crypto rule: bcrypt as lead Do recommendation, not Argon2id (STANDARDS GAP)
        The Do example leads with bcrypt (rounds=12). OWASP A04:2025 now explicitly recommends
        Argon2, yescrypt, scrypt, or PBKDF2-HMAC-SHA-512 as first-choice algorithms; bcrypt
        is described as legacy-acceptable with "additional consultation recommended." Presenting
        bcrypt as the primary Do example contradicts OWASP 2025's stated hierarchy. Argon2id
        should be the lead example, with bcrypt noted as a legacy-acceptable alternative.
        The PBKDF2HMAC derive_key() helper in the same Do block uses SHA-256 (not SHA-512),
        which is below the OWASP-recommended PBKDF2-HMAC-SHA-512 variant.
        Fix required: replace bcrypt lead with argon2-cffi (Argon2id); note bcrypt as
        legacy-acceptable; update derive_key to use hashes.SHA512() with >=600000 iterations.

      ISSUE 3 — A06 insecure design rule: CWE-840 not in official A06:2025 mapping (REF ERROR)
        The Refs line cites CWE-840 (Business Logic Errors). The OWASP A06:2025 page does not
        map CWE-840 to this category. A06 maps 39 CWEs covering privilege management,
        credential storage, trust boundaries, and upload restrictions — not business logic.
        Fix required: replace CWE-840 with a CWE that appears in the official A06:2025
        mapping, e.g. CWE-269 (Improper Privilege Management) or CWE-501 (Trust Boundary
        Violation).

      ISSUE 4 — A07 authentication rule: session.regenerate() does not exist in Flask (BROKEN Do)
        The Do example calls session.regenerate() on Flask's session proxy object. Flask's
        session object is a dict-like proxy (SecureCookieSession) with no regenerate() method.
        This call raises AttributeError at runtime. The correct Flask pattern for session
        fixation prevention is session.clear() followed by assigning new values; actual session
        ID rotation requires flask-login's login_user() or a custom session interface.
        Fix required: remove session.regenerate() and replace with a comment explaining that
        Flask regenerates the session cookie automatically when session.clear() is called and
        new values are set, or show the flask-login pattern.

      Non-blocking observations (no status change):
      - A02 Refs cite CWE-209 (Information Exposure Through Error Messages); CWE-209 does not
        appear in the official A02:2025 CWE mapping (16 CWEs), though it is present in A10.
        The Don't example illustrates CWE-209 behavior, making it misleading under A02.
        Recommend moving CWE-209 reference to the A10 rule where it is officially mapped.
      - A03 Refs cite CWE-829 (Inclusion of Functionality from Untrusted Control Sphere).
        The OWASP A03:2025 page maps CWE-1357, CWE-1395, CWE-1104, CWE-447, CWE-1329,
        CWE-1035. CWE-829 is not in that list; it belongs to A08 (Integrity Failures).
        Recommend replacing with CWE-1395 or CWE-1357.
      - A05 Refs cite CWE-79 (XSS) but the Do/Don't examples show only SQL and OS-command
        injection. No XSS example is present. Either add an XSS Do/Don't pair or drop CWE-79
        from Refs to avoid implying coverage that is not demonstrated.
      - A08 OWASP page returned 404 on both URL variants tested; CWE mapping could not be
        independently verified from the live site. CWE-502 and CWE-829 citations in A08 Refs
        appear reasonable based on the 2021 predecessor category, but are unverified against
        the 2025 RC1 mapping.

      Re-audited 2026-05-25 after P0.7 rewrite (commit c04b1d9): all 4 defects verified fixed.
      ISSUE 1 (SSRF): socket.getaddrinfo is the sole resolution path; no except ValueError: pass swallow.
      ISSUE 2 (crypto): Argon2id leads via argon2-cffi; bcrypt demoted to legacy-acceptable comment;
        derive_key uses hashes.SHA512() with 600_000 iterations.
      ISSUE 3 (A06 ref): CWE-840 replaced with CWE-269.
      ISSUE 4 (session): session.regenerate() removed; rotate_session_after_login() uses session.clear()
        with docstring explaining Flask's signed-cookie model.
    issues_filed: []

  - path: rules/_core/ai-security.md
    status: passed
    reviewed_by: rocklambros
    reviewed_on: 2026-05-25
    notes: |
      Audited all 10 rule sections across 5 categories (Data Security, Model Security,
      Inference Security, LLM Security, Infrastructure Security, Monitoring).
      Four distinct issues found; two are blocking, two are serious but secondary.

      ISSUE 1 — Prevent Prompt Injection: denylist as primary Do mitigation (CRITICAL)
        The _sanitize_input() method in the "Prevent Prompt Injection" Do example
        implements a regex denylist (patterns_to_remove = ['ignore previous
        instructions', 'you are now', ...]) as the primary injection defense.
        OWASP LLM01:2025 explicitly de-emphasizes simple pattern matching in favor of
        structural isolation (separate system/user roles in the message array),
        semantic filters, privilege control, and human-in-the-loop for high-risk
        actions. The denylist patterns shown are trivially bypassed by encoding,
        paraphrasing, Unicode substitution, or multilingual injection. Presenting this
        as a Do example teaches a false sense of security and directly contradicts the
        current standard. The structural isolation pattern (using the messages array to
        separate system prompt from user content, as the outer generate() method already
        does) is the correct primary defense; the denylist should be removed or
        demoted to a comment noting its severe limitations.
        Fix required: remove _sanitize_input denylist; make structural role isolation
        the named defense; add a note referencing OWASP LLM01:2025 recommendation for
        semantic filtering and privilege reduction as the layered defense.

      ISSUE 2 — Validate LLM Outputs: wrong OWASP category number (STANDARDS MISMATCH)
        The Refs line cites "OWASP LLM02" for the output handling rule. In the OWASP
        LLM Top 10 2025 taxonomy, LLM02:2025 is "Sensitive Information Disclosure."
        Output handling (insufficient validation of LLM-generated outputs before
        downstream use) maps to LLM05:2025 "Improper Output Handling." The file
        appears to use the 2023 (v1.1) numbering where LLM02 was "Insecure Output
        Handling." All OWASP LLM refs in the file omit the year qualifier (:2025),
        making version ambiguity a file-wide issue.
        Fix required: update "OWASP LLM02" to "OWASP LLM05:2025" in the Validate
        LLM Outputs Refs line; add :2025 qualifier to all OWASP LLM refs in the file.

      ISSUE 3 — Secure Model Artifacts: AML.T0000 is not a valid ATLAS technique (REF ERROR)
        The Refs line cites "MITRE ATLAS AML.T0000" for the model theft / tampering
        rule. AML.T0000 does not exist in the MITRE ATLAS technique catalog (as of
        ATLAS v4, techniques begin at AML.T0006 "Active Scanning"). The intent appears
        to be model theft / exfiltration. The correct ATLAS technique for unauthorized
        model access / theft is AML.T0000 is likely a placeholder that was never
        resolved. The nearest applicable techniques are AML.T0040 (ML Model Inference
        API Access, covering extraction) and AML.T0035 (ML Artifact Collection, covering
        direct model file theft). MITRE ATLAS live pages returned 404 during this audit,
        so the exact current technique ID could not be confirmed from the live site;
        this finding is based on training-set knowledge of the ATLAS v4 taxonomy.
        Fix required: replace AML.T0000 with the verified ATLAS technique for model
        artifact theft/collection (AML.T0035 or current equivalent); confirm against
        the live ATLAS catalog before publishing.

      ISSUE 4 — Validate Model Inputs: broken JPEG magic byte check (CODE BUG)
        In the "Validate and Sanitize Model Inputs" Do example, the ImageInput validator
        checks: if not v[:8] in [b'\x89PNG', b'\xff\xd8\xff']. The JPEG magic bytes
        entry b'\xff\xd8\xff' is 3 bytes. v[:8] yields 8 bytes. A 3-byte bytes literal
        is never equal to an 8-byte slice, so the JPEG branch of the allowlist never
        matches. Every JPEG file will be rejected as having an invalid format, making
        the validator both broken (rejects valid JPEG) and incomplete (fails to
        demonstrate correct magic byte checking). The PNG entry b'\x89PNG' is also
        only 4 bytes, not the correct 8-byte PNG signature (b'\x89PNG\r\n\x1a\n').
        Fix required: use correct full magic byte sequences and match the slice length
        to the signature length (e.g., check v[:4] == b'\x89PNG' OR v[:3] == b'\xff\xd8\xff').

      Non-blocking observations (no status change):
      - Rule "Protect Sensitive Training Data" Do example: the apply_differential_privacy()
        method imports GaussianNB from diffprivlib but then calls dp_preprocessor.transform(),
        where dp_preprocessor is never defined. This is an undefined-variable bug that
        would raise NameError at runtime. The GaussianNB import is unused. The method
        body as written cannot execute. Fix: instantiate dp_preprocessor from a
        diffprivlib class (e.g., diffprivlib.models.GaussianNB) or use the pipeline
        pattern; remove the orphaned import.
      - Rule "Monitor for ML-Specific Attacks" Do example: _analyze_patterns() is called
        but never defined in the shown code. This is a stub, not a logic error, but
        it leaves the Do example non-runnable. Advisory: add a note that this is
        illustrative or provide a minimal implementation.
      - Rule "Isolate ML Inference Environments" Do example: binds Flask to
        app.run(host='10.0.0.1', ...) using a hardcoded RFC 1918 address. Production
        code should use an environment variable or 127.0.0.1; a hardcoded internal IP
        is deployment-environment-specific and will silently fail on a different host.
        Advisory only — does not affect security correctness of the example.
      - MITRE ATLAS live pages (atlas.mitre.org) returned 404 for all technique URLs
        tried during this audit. ATLAS technique name verification (AML.T0015,
        AML.T0020, AML.T0024, AML.T0040, AML.T0043) is based on training-set knowledge
        of the ATLAS v4 taxonomy and could not be independently confirmed from the live
        site. Reviewer notes this limitation; recommend a follow-up verification pass
        against the live ATLAS catalog when the site is accessible.

      Re-audited 2026-05-25 after P0.7 rewrite (commit ec2e766): all 4 defects verified fixed.
      ISSUE 1 (prompt injection): _sanitize_input and patterns_to_remove removed; structural
        role isolation is the named primary defense per OWASP LLM01:2025.
      ISSUE 2 (OWASP refs): all LLM refs updated to :2025 qualifier; Validate LLM Outputs
        now cites OWASP LLM05:2025 (Improper Output Handling).
      ISSUE 3 (ATLAS ref): AML.T0000 replaced with AML.T0035 and AML.T0040.
      ISSUE 4 (magic bytes): _image_format() function uses length-aware buf.startswith()
        checks; no v[:8] in [...] pattern anywhere in the file.
    issues_filed: []

  - path: rules/_core/agent-security.md
    status: passed
    reviewed_by: rocklambros
    reviewed_on: 2026-05-25
    notes: |
      Audited all 8 rule sections across 5 categories (Tool Use, Code Execution,
      Input/Output, Session, Monitoring). Four distinct issues found; two are blocking
      (wrong OWASP numbers + code bugs), two are secondary but important.

      OWASP LLM 2023->2025 NUMBERING: YES — applies to this file.
        All OWASP LLM refs omit the :2025 qualifier and use 2023 v1.1 IDs.
        Three refs cite wrong numbers (LLM07->LLM06, LLM02->LLM05, LLM05->LLM03).
        Detailed in ISSUE 1, ISSUE 2, ISSUE 3 below.

      ISSUE 1 — Three OWASP LLM refs use wrong 2023 numbers and names (STANDARDS MISMATCH)
        Line 114: "OWASP LLM07 (Insecure Plugin Design)" — In 2025, LLM07 is "System
          Prompt Leakage." "Insecure Plugin Design" was the 2023 v1.1 LLM07.
          Tool/plugin security now maps to LLM06:2025 (Excessive Agency).
          Fix: change to "OWASP LLM06:2025 (Excessive Agency)."
        Line 514: "OWASP LLM02 (Insecure Output Handling)" — In 2025, LLM02 is
          "Sensitive Information Disclosure." Improper/Insecure Output Handling is
          LLM05:2025. This ref is doubly wrong (number and name).
          Fix: change to "OWASP LLM05:2025 (Improper Output Handling)."
        Line 708: "OWASP LLM05 (Supply Chain Vulnerabilities)" — In 2025, LLM05 is
          "Improper Output Handling." Supply Chain is LLM03:2025. This appears on the
          "Isolate Agent Sessions" rule where neither Supply Chain nor Output Handling
          is the right category; the rule is about session data leakage (CWE-200).
          Fix: remove the mismatched LLM ref; cite LLM06:2025 (Excessive Agency)
          for agent scope control, or rely on the CWE-200 ref already present.
        Additional: Lines 309 and 415 cite "OWASP LLM06 (Excessive Agency)" with
          correct names but missing :2025 qualifier. Not wrong, but inconsistent.
          Fix: add :2025 qualifier throughout.

      ISSUE 2 — set_limits() defined but never called in _execute_sandboxed (CODE BUG / CRITICAL)
        In Rule "Validate Tool Calls Before Execution", the _execute_sandboxed() method
        defines an inner function set_limits() that calls resource.setrlimit() to cap
        CPU time (30s) and virtual memory (512MB). This function is defined at line 83
        but is never invoked anywhere. The resource limits that the comment claims are
        applied are silently not applied. An agent task can run indefinitely and consume
        unlimited memory. The code creates a false impression of resource isolation that
        does not exist at runtime.
        Fix required: add set_limits() call inside _execute_sandboxed before executing
        the tool, or use resource.setrlimit() inline without the dead inner function.

      ISSUE 3 — _check_code_safety() called but never defined (UNDEFINED METHOD BUG)
        In Rule "Implement Tool Permission Boundaries", check_permission() calls
        self._check_code_safety(params.get('code'), policy) at line 178 when
        tool_name == 'execute_code'. No _check_code_safety method is defined anywhere
        in the ToolPermissionPolicy class. Calling check_permission() for execute_code
        raises AttributeError at runtime, making the permission check for the highest-
        risk tool silently fail with an uncaught exception. In a framework that catches
        exceptions broadly and defaults to allow, this is a security bypass.
        Fix required: implement _check_code_safety() with at minimum a check that
        the code string does not contain blocked_imports entries; or inline the logic
        into the elif branch.

      ISSUE 4 — MITRE ATLAS AML.T0051 cannot be verified (UNVERIFIABLE REF)
        Line 114 cites "MITRE ATLAS AML.T0051" for the tool call validation rule.
        The ATLAS live site (atlas.mitre.org) returned HTTP 404 for all technique URLs
        during this audit — same failure seen in the ai-security.md audit. From training-
        set knowledge of ATLAS v4, AML.T0051 is a plausible technique ID (approximate
        name: LLM Prompt Injection), which is relevant to tool manipulation via
        injection. Unlike AML.T0000 in ai-security.md (definitively non-existent),
        AML.T0051 cannot be confirmed or refuted from the live site. Flagged as
        unverifiable rather than definitively wrong. Recommend verifying against the
        live ATLAS catalog before publishing.

      Non-blocking observations (no status change):
      - Rule "Sandbox Agent-Generated Code" Do example: "import RestrictedPython" on
        line 228 is unused (the module is accessed via "from RestrictedPython import
        ..."). Minor redundancy; does not affect logic.
      - Rule "Implement Tool Permission Boundaries" Do example: blocked_domains includes
        '*.internal' (glob wildcard). Python's str.startswith() does not interpret glob
        patterns, so '*.internal' only blocks domains literally starting with that
        string. Additionally, the web_request domain check is never invoked from
        check_permission() (falls through to "return True"). The domain blocking is
        documented but not implemented in the shown code. Advisory only.
      - Rule "Validate Agent Outputs Before Action" Do example: file content validation
        uses a regex denylist (dangerous_patterns). Same anti-pattern flagged as
        critical for prompt injection in ai-security.md; in this context (output content
        validation) it is less severe but still bypassable. Advisory: note the limitation.
      - signal.SIGALRM (line 91) is not available on Windows. Portability note only.

      Re-audited 2026-05-25 after P0.7 rewrite (commit 3fd7964): all 4 defects verified fixed.
      ISSUE 1 (OWASP refs): all LLM refs carry :2025 qualifier; LLM07->LLM06:2025,
        LLM02->LLM05:2025, LLM05->LLM06:2025 remappings applied throughout.
      ISSUE 2 (set_limits): preexec_fn=set_limits wired in subprocess.run call; resource
        limits are applied in the child process before exec.
      ISSUE 3 (_check_code_safety): method implemented with full AST analysis using
        forbidden_builtins and forbidden_modules frozensets; walks ast.Import, ast.ImportFrom,
        ast.Call, and ast.Attribute nodes.
      ISSUE 4 (ATLAS refs): no change required beyond prior fixes; AML.T0051 retained
        (unverifiable but plausible per training-set knowledge of ATLAS v4).
    issues_filed: []

  - path: rules/_core/mcp-security.md
    status: passed
    reviewed_by: rocklambros
    reviewed_on: 2026-05-25
    audit_coverage: full
    notes: |
      Audited all 14 rule sections across 10 MCP categories plus 4 operational rules.
      OWASP MCP Top 10:2025 IDs verified against live OWASP page (fetched during audit).
      Five distinct blocking issues found; three are code bugs.

      OWASP LLM 2023->2025 NUMBERING: PARTIAL — one instance found.
        Line 976 cites "OWASP LLM01" without the :2025 qualifier. In 2025, LLM01:2025 is
        "Prompt Injection," which IS the correct category for the MCP06 rule. The number is
        right but the year qualifier is missing, consistent with the systemic pattern found
        in all prior _core/ files. This is less severe than the wrong-number cases in
        agent-security.md but still non-conformant.

      ISSUE 1 — MCP05 Do example: missing 'import os' (CODE BUG / CRITICAL)
        The SafeCommandExecutor Do block at lines 739-823 imports subprocess, shlex, re,
        and typing.List. Methods _resolve_command_path() and _sanitize_argument() use
        os.path.isfile(), os.access(), and os.path.abspath() — but 'import os' is absent
        from the Do block. (The only 'import os' in the file, line 829, is inside the
        VULNERABLE Don't block.) Running the Do example raises NameError: name 'os' is not
        defined at the first call to _resolve_command_path(). The command executor, which
        is the primary safe-execution control, fails immediately at runtime.
        Fix required: add 'import os' to the Do block imports section.

      ISSUE 2 — MCP07 Do example: missing 'import os' (CODE BUG)
        The SecureMCPServer Do block at lines 992-1067 imports ssl, jwt, datetime,
        timedelta, and Optional. The __init__ method immediately accesses
        os.environ["JWT_SECRET"] — but 'import os' is not present. The server cannot
        initialize; it raises NameError before any authentication logic runs.
        Fix required: add 'import os' to the MCP07 Do block imports.

      ISSUE 3 — MCP09 Do example: missing 'import asyncio' (CODE BUG)
        The MCPGovernanceFramework Do block at lines 1227-1320 imports requests, List,
        Dict, dataclass, and datetime. The _validate_security_baseline() method calls
        await asyncio.gather(*checks) but 'import asyncio' is absent. This raises
        NameError when any MCP server registration or shadow-server discovery is attempted.
        Fix required: add 'import asyncio' to the MCP09 Do block imports.

      ISSUE 4 — MCP03 Pydantic validator: broken cross-field check (CODE BUG / CRITICAL)
        The ToolDefinition model at line 575 uses @validator('destructive',
        'requires_confirmation') with the check:
          if values.get('destructive') and not values.get('requires_confirmation'):
        In Pydantic v1, @validator receives 'v' (the current field value) and 'values'
        (all previously validated fields). When the validator runs for 'requires_confirmation',
        'values' contains 'destructive' but NOT 'requires_confirmation' (that is 'v').
        The check 'not values.get("requires_confirmation")' is always True (the key is
        absent from values), so the validator raises ValueError whenever destructive=True
        regardless of the actual value of requires_confirmation. A tool with
        destructive=True AND requires_confirmation=True fails validation — the exact
        configuration the Do example is meant to approve. The policy constraint is
        inverted: it blocks safe tools and passes unsafe ones.
        Fix required: change 'not values.get("requires_confirmation")' to 'not v' so the
        check reads: if values.get('destructive') and not v: raise ValueError(...).
        Additionally, note that Pydantic @validator is deprecated in v2 (released 2023);
        production code in 2026 should use @field_validator.

      ISSUE 5 — MCP06 section name does not match OWASP MCP06:2025 (CATEGORY MISMATCH)
        The file section heading is "MCP06:2025 - Prompt Injection via Contextual Payloads"
        but OWASP MCP06:2025 is officially named "Intent Flow Subversion" — defined as
        malicious instructions embedded in context hijacking the intent flow to steer the
        agent toward an attacker's objective. The file's content (sanitizing external data
        in prompts, delimiting system instructions) actually covers what OWASP describes
        as the MCP06 threat, but the section title uses a non-standard name. This creates
        ambiguity for practitioners cross-referencing the standard.
        Fix required: update section heading to "MCP06:2025 - Intent Flow Subversion" and
        note in the rule's Why text that prompt injection is the primary attack vector for
        intent flow subversion.

      Non-blocking observations (no status change):
      - Line 976 Refs: "OWASP LLM01" should be "OWASP LLM01:2025" for consistency. The
        category is correct (Prompt Injection), only the year qualifier is missing.
      - MCP07 cipher suite (line 1018): 'ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM' includes
        DHE+AESGCM. While less critical because ECDHE suites are listed first and preferred,
        DHE without explicit group parameters can negotiate weak Diffie-Hellman. Recommend
        removing DHE+AESGCM from the cipher string to remove any ambiguity.
      - MCP07 JWT algorithm (lines 1036, 1186): uses HS256 (symmetric HMAC). In an mTLS
        context where the client has already presented a certificate, RS256/ES256 (asymmetric)
        is preferred for JWT because it does not require sharing the signing secret with
        all verifying parties. HS256 with a shared secret is acceptable for single-server
        scenarios but is a design gap in distributed mTLS deployments.
      - Operational section (line 1864) Refs: "OWASP A05:2021" — the project targets
        OWASP Top 10 2025 throughout; this should be updated to A05:2025
        (Security Misconfiguration, same category) for version consistency.
      - JSON-RPC injection: no rule explicitly covers JSON-RPC message injection (malformed
        id/method/params fields designed to escape the JSON-RPC envelope). This is a gap for
        a file dedicated to MCP security, since MCP transport uses JSON-RPC 2.0. Advisory:
        add a rule or note under MCP05 for JSON-RPC argument boundary validation.
      - Pydantic @validator syntax (MCP03, lines 568-592) is deprecated as of Pydantic v2
        (2023). In 2026 this is a maintainability concern; future Pydantic v3 will remove it.
        Advisory: migrate to @field_validator with mode='before'/'after' as appropriate.

      Re-audited 2026-05-25 after P0.7 rewrite (commit b17b05f): all 5 defects verified fixed.
      ISSUE 1 (MCP05 import os): 'import os' present at line 747 in the Do block of
        SafeCommandExecutor, preceding all os.path calls.
      ISSUE 2 (MCP07 import os): 'import os' present at line 1001 in the Do block of
        SecureMCPServer, before os.environ["JWT_SECRET"] access.
      ISSUE 3 (MCP09 import asyncio): 'import asyncio' present at line 1237 in the Do block
        of MCPGovernanceFramework.
      ISSUE 4 (MCP03 Pydantic validator): @validator('requires_confirmation', always=True)
        with body check 'if values.get("destructive") and not v' — uses 'not v' correctly.
      ISSUE 5 (MCP06 heading): section heading updated to "MCP06:2025 - Intent Flow Subversion".
    issues_filed: []

  - path: rules/_core/rag-security.md
    status: passed
    reviewed_by: rocklambros
    reviewed_on: 2026-05-25
    audit_coverage: full
    rules_audited:
      - Document Source Validation
      - Metadata Sanitization
      - Multi-Tenant Isolation
      - Query Input Validation
      - Context Window Poisoning Prevention
      - PII Filtering in Results
      - Embedding Model Authentication
      - Model Version Consistency
    notes: |
      Audited all 8 rule sections. Five distinct issues found; three are blocking.
      The file cites "OWASP LLM Top 10 v1.1 (2023)" in its References section (line 1492),
      which is unambiguous evidence that it was authored against the 2023 taxonomy. All
      OWASP LLM category numbers are wrong for 2025 and no :2025 qualifiers are present.

      OWASP LLM 2023->2025 NUMBERING: YES — applies throughout this file.
        The References section (line 1492) explicitly cites "OWASP LLM Top 10 v1.1 (2023)."
        All six OWASP LLM inline citations use 2023 (v1.1) numbers without :2025 qualifiers.
        Three refs carry the wrong number when read as 2025:
          - LLM06 (Sensitive Information Disclosure) at lines 153, 465, 999:
            In 2025, LLM06:2025 = "Excessive Agency." The correct 2025 ref is LLM02:2025.
          - LLM08 (Excessive Agency) at line 1228:
            In 2025, LLM08:2025 = "Vector and Embedding Weaknesses." LLM06:2025 is the
            correct 2025 ref for Excessive Agency.
        LLM08:2025 (Vector and Embedding Weaknesses) — the category that most directly
        covers RAG attack surfaces (adversarial queries, embedding model poisoning,
        cross-tenant vector leakage, mixed-model inconsistency) — is absent from all
        rule Refs sections despite being explicitly in scope for this file's topic.
        Fix required: update all OWASP LLM citations to 2025 numbering; update the
        References section to cite "OWASP LLM Top 10 2025"; add LLM08:2025 citations
        to Embedding Model Authentication, Model Version Consistency, and Query Input
        Validation rules.

      ISSUE 1 — Custom exceptions undefined in every rule block (CODE BUG / BLOCKING)
        All Do code examples raise custom exceptions (SecurityError, ValidationError,
        ConfigurationError, RateLimitError, AuthenticationError, EmbeddingError,
        ModelMismatchError) that are never defined or imported anywhere in the file.
        Every rule's Do example raises NameError at the first exception path encountered.
        This is a file-wide bug: seven distinct custom exception classes are used across
        all eight rules, none with a definition or an import statement referencing an
        external package. A rule teaching "do this securely" cannot have code that
        fails immediately when the security guard trips.
        Fix required: add exception class definitions at the top of each Do block
        (e.g., class SecurityError(Exception): pass) or add an imports comment
        referencing a shared exceptions module; the classes must be defined before
        they can be raised.

      ISSUE 2 — Multi-Tenant Isolation Do example: missing 'datetime' import (CODE BUG)
        The TenantIsolation/SecureVectorStore Do block (lines 312-430) imports
        Optional, hashlib, hmac, and functools.wraps. At line 368 it calls
        datetime.utcnow().isoformat() — but 'from datetime import datetime' is absent
        from the block. This raises NameError at the first document ingestion.
        Additionally, 'from functools import wraps' is imported but @wraps is never
        applied to any function in the block; it is an orphaned import.
        Fix required: add 'from datetime import datetime' to the block imports;
        remove the unused 'from functools import wraps'.

      ISSUE 3 — Embedding Model Authentication: PROJECT_ID undefined (CODE BUG)
        The load_embedding_credentials() function at lines 1174-1195 references
        PROJECT_ID in the f-string on line 1184 to build the GCP Secret Manager path.
        PROJECT_ID is never defined, imported, or obtained from os.environ in this
        function or its enclosing scope. This raises NameError when the GCP path is
        taken. Because the function silently falls through to Option 2 (env var) on any
        exception, the bug masks itself at runtime — the code appears to work but the
        "preferred for production" path is dead code.
        Fix required: add PROJECT_ID = os.environ.get("GCP_PROJECT_ID") before the
        try block, or use os.environ["GCP_PROJECT_ID"] and let KeyError propagate so
        the missing config is visible.

      ISSUE 4 — Denylist as primary prompt-injection defense (DEPRECATED MITIGATION)
        Two rules use regex denylist filtering as their primary injection control:
          - Metadata Sanitization: _remove_injection_patterns() at lines 240-257
          - Query Input Validation: _neutralize_injection_patterns() at lines 506-534
          - Context Window Poisoning: ContentFilter.filter() at lines 755-790
        All three implement substring/regex pattern matching against known injection
        phrases. OWASP LLM01:2025 explicitly de-emphasizes pattern matching in favor
        of structural role isolation, privilege reduction, and semantic filtering.
        The patterns shown are trivially bypassed by encoding, paraphrasing, Unicode
        substitution, or zero-width characters. These denylists are presented as the
        named security control rather than as a secondary defense-in-depth layer.
        Metadata Sanitization and Query Input Validation make no mention of structural
        isolation (separating system/user roles in the message array) as the primary
        control. Context Window Poisoning Prevention does correctly add structural
        delimiters and instruction text in _format_context(), making it better.
        Fix required: in Metadata Sanitization and Query Input Validation, demote the
        denylist to a defense-in-depth note; name structural isolation (message-role
        separation at inference time) as the primary control and reference LLM01:2025.

      ISSUE 5 — LLM08:2025 (Vector and Embedding Weaknesses) not covered (COVERAGE GAP)
        LLM08:2025 is the new 2025 category that directly describes attacks on RAG
        vector infrastructure: adversarial embedding manipulation, cross-tenant
        similarity leakage, embedding model substitution, and dimensional mismatch
        attacks used to defeat retrieval. This file covers RAG security but contains
        no rule or Ref section entry for LLM08:2025. The Model Version Consistency
        rule is the closest in scope but cites AML.T0019 (Publish Poisoned Datasets)
        and says nothing about adversarial embedding inputs or vector store integrity
        attacks. An embedding-specific adversarial attack rule (adversarial query
        crafting to force retrieval of attacker-chosen documents) is entirely absent.
        Fix required: add LLM08:2025 to Refs in Embedding Model Authentication,
        Model Version Consistency, and Multi-Tenant Isolation; add a new rule covering
        adversarial embedding manipulation and dimensional integrity validation.

      Non-blocking observations (no status change):
      - MITRE ATLAS AML.T0051 (line 825, Context Window Poisoning) is the same
        unverifiable technique cited in agent-security.md. The ATLAS live site
        returned 404 during the prior audits; plausibility is affirmed from training
        knowledge but cannot be confirmed from the live catalog. Same caveat applies.
      - AML.T0019 (line 1427, Model Version Consistency) is cited for the model
        version tracking rule. "Publish Poisoned Datasets" is tangentially related
        to model version drift but is not the tightest fit. AML.T0054 (LLM Jailbreak)
        or AML.T0040 (ML Model Inference API Access) would be closer for the version
        consistency attack scenario. Advisory only.
      - The file header (Version History, line 1485) shows version 1.0.0 with date
        "2024-01" and the References section cites the 2023 OWASP taxonomy, confirming
        the file pre-dates the 2025 OWASP LLM Top 10 and has not been updated since.
      - InsecureEmbeddingClient.embed() at line 1210 is declared 'async def' but
        calls self.client.post() on a synchronous httpx.Client (not AsyncClient). This
        is an await mismatch; await on a non-coroutine raises TypeError. Minor because
        it is in the Don't example, but a reviewer testing both examples would see it
        fail for the wrong reason. Advisory: make the Don't use httpx.Client().post()
        without async, or note that it is intentionally broken.

      Re-audited 2026-05-25 after P0.7 rewrite (commit 6e40c98): all 5 defects verified fixed.
      ISSUE 1 (exception classes): 7-class hierarchy defined in '## Common Exception Classes'
        block (RAGSecurityError base + SecurityError, ValidationError, ConfigurationError,
        RateLimitError, AuthenticationError, EmbeddingError, ModelMismatchError).
      ISSUE 2 (datetime import): 'from datetime import datetime' present in Multi-Tenant
        Isolation Do block (line 361).
      ISSUE 3 (PROJECT_ID): bare PROJECT_ID removed; replaced with
        'project_id = os.environ.get("GCP_PROJECT_ID")' guard before the try block.
      ISSUE 4 (denylist methods): _remove_injection_patterns and _neutralize_injection_patterns
        removed; replaced with _wrap_metadata_for_isolation and _wrap_query_for_isolation
        structural-isolation patterns citing OWASP LLM01:2025.
      ISSUE 5 (LLM08:2025 coverage): new '## Rule: Defend Against Adversarial Embedding
        Manipulation' section added with LLM08:2025 refs in Embedding Model Authentication,
        Model Version Consistency, and Multi-Tenant Isolation.
