        "Excessive Agency." The file uses the 2023 (v1.1) numbering where LLM08 was
        "Excessive Agency." The Sandbox rule (line 89) and Quick Reference (line 470)
        cite "OWASP LLM06" for excessive agency — correct category, wrong year label —
