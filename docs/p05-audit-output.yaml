          Correct ref: LLM02 (Sensitive Information Disclosure).
        - Rules "Validate PagedAttention Configuration" (line 151) and "Implement
          Request Isolation in Batches" (line 254) cite OWASP LLM04 for resource
          exhaustion/DoS. In 2025 LLM04 = Data and Model Poisoning.
          Correct ref: LLM10 (Unbounded Consumption).
        - Rule "Secure Model Source Verification" (line 345) cites OWASP LLM05 for
          supply chain. In 2025 LLM05 = Improper Output Handling.
          Correct ref: LLM03 (Supply Chain Vulnerabilities).
        All three mismatches are in normative Refs fields and direct practitioners to
        the wrong OWASP categories.
        Fix required: update LLM06->LLM02, LLM04->LLM10, LLM05->LLM03.

