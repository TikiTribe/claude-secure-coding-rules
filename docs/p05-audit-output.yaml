    notes: |
      Audited all 8 rule sections. Three required topics are entirely absent per checklist,
      and one code example uses the wrong import namespace for Spring Boot 3+.

      ISSUE 1 — JNDI lookup rule entirely absent (MISSING REQUIRED RULE)
        The checklist requires a JNDI rule covering the Log4Shell class of vulnerabilities:
        no untrusted data should flow into JNDI lookup paths
        (javax.naming.InitialContext.lookup, log4j message patterns, LDAP/RMI URLs).
        No such rule exists anywhere in the file. Log4Shell (CVE-2021-44228) and variants
        remain one of the highest-profile Java-specific RCE vectors. Omitting this rule
        leaves developers without guidance on this attack surface.
        Fix required: add a JNDI rule (level: strict) prohibiting untrusted data in any
        JNDI lookup path; include Log4j2 PatternLayout as the canonical Don't example
        and log4j2.formatMsgNoLookups=true or upgrade to log4j 2.17.1+ as the Do.

      ISSUE 2 — Reflection/setAccessible rule entirely absent (MISSING REQUIRED RULE)
        The checklist requires a reflection rule: no setAccessible(true) across security
        boundaries (bypassing module access, violating encapsulation of security code).
        No such rule exists in the file. Reflection-based access control bypass is a
        documented Java attack vector (CWE-470; OWASP A01:2025).
        Fix required: add a reflection rule (level: strict) prohibiting
        setAccessible(true) on untrusted or externally-supplied Class objects; show
        the module-system opens directive as the Do alternative.

      ISSUE 3 — Streams terminal operations rule entirely absent (MISSING REQUIRED RULE)
        The checklist requires a streams rule ensuring terminal operations are used safely.
        No such rule exists in the file.
        Fix required: add a streams rule (level: warning) covering forEach with side
        effects that suppress exception propagation, and parallel streams with shared
        mutable state causing data races.

