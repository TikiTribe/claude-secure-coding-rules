        in the human approval rule Refs and Quick Reference. Add :2025 qualifier to
        all OWASP LLM references throughout the file.

      ISSUE 2 — Sandbox rule Do example: execution_policies parameter does not exist in
      LocalCommandLineCodeExecutor 0.4.x (BROKEN Do / BLOCKING)
        Lines 38-45 instantiate LocalCommandLineCodeExecutor with:
          execution_policies={"python": True, "bash": False, "javascript": False}
        The autogen 0.4.x LocalCommandLineCodeExecutor class accepts timeout and
        work_dir but has no execution_policies parameter. Passing this dict raises
        TypeError at instantiation ("unexpected keyword argument 'execution_policies'").
        The comment "Restricted execution" implies this parameter enforces a sandbox,
        but the restriction is silently not applied even if the TypeError were caught.
        Fix required: remove execution_policies; document that LocalCommandLineCodeExecutor
        has no built-in language restriction; note that restricting execution languages
        requires a custom executor subclass or relying solely on DockerCommandLineCodeExecutor.

      ISSUE 3 — Sandbox rule Do example: docker_network parameter does not exist in
      DockerCommandLineCodeExecutor 0.4.x (BROKEN Do / BLOCKING)
        Lines 27-33 pass docker_network="none" to DockerCommandLineCodeExecutor.
        This parameter does not exist in the 0.4.x API. The constructor accepts image,
        timeout, and work_dir (among others) but not docker_network. The call raises
        TypeError at instantiation, and the network isolation the comment claims is not
        applied. Network isolation in autogen 0.4.x requires passing a pre-configured
        docker.DockerClient with the target network set on the container host_config,
        or using a custom DockerCommandLineCodeExecutor subclass.
        Fix required: remove docker_network="none"; add a comment that network isolation
        requires a custom Docker client configured before passing to the executor, or
        link to the autogen 0.4.x docs for custom container configuration.

      ISSUE 4 — File System rule Do example: bind_dir uses Docker volume-mount string
      syntax; autogen 0.4.x bind_dir takes a Path object (BROKEN Do / BLOCKING)
        Line 439 passes:
          bind_dir="/app/data:/sandbox/data:ro"
        The autogen 0.4.x DockerCommandLineCodeExecutor.bind_dir parameter accepts a
        pathlib.Path (or str path) pointing to the host directory to bind-mount into
        the container. It does not parse a Docker-style "src:dst:mode" string. Passing
        the colon-delimited string causes the executor to treat the entire string as a
        host path, which does not exist, resulting in a FileNotFoundError or silent bind
        failure depending on Docker daemon version.
