      - Secure Provider Authentication
      - Integrate Security Scanning in CI/CD
      - Review Plan Output Before Apply
      - Use Workspaces for Environment Isolation
      - Document Security Decisions
    notes: |
      Re-audit 2026-05-26 (commit 639b849): all 5 blocking/significant defects fixed.
      SA-12 citations gone (count=0); PCI-DSS 3.2.1 gone (count=0); checkov-action@master /
      terrascan-action@main / tfsec-action gone (count=0); has_kms_encryption and
      has_access_logging both defined as rules with bodies; encryptionsalt correctly placed
      in Pulumi.<stackname>.yaml (not Pulumi.yaml). Status -> passed.

      Original audit notes follow:
      Audited all 19 rule sections across 8 categories (State Security, Secrets
      Management, Module Supply Chain, Drift Detection, Policy as Code, Provider
      Security, Security Testing, Additional Practices). Five distinct issues found;
      three are blocking (wrong control IDs, non-functional Rego policy, retired
      standard citation). Two are significant but secondary (mutable action pins,
      incorrect Pulumi config placement). No OWASP LLM numbering issues — this file
      uses NIST 800-53, CIS Benchmarks, and PCI-DSS/HIPAA, not the LLM taxonomy.

      ISSUE 1 — Three SA-12 citations carry Rev 4 control ID and description (STANDARDS VERSION / BLOCKING)
        Lines 544, 607, and 1117 cite "NIST 800-53 SA-12 (Supply Chain Protection)."
        In NIST SP 800-53 Revision 5 (published September 2020, current version), SA-12
        no longer exists as "Supply Chain Protection." SA-12 in Rev 5 is "Memory
        Protection" (hardware/firmware side-channel mitigations). Supply chain controls
        moved to the new SR (Supply Chain Risk Management) family: SR-3 (Supply Chain
        Controls and Processes), SR-4 (Provenance), SR-5 (Acquisition Strategies,
        Tools, and Methods). Citing SA-12 as "Supply Chain Protection" teaches Rev 4
        taxonomy superseded in 2020. A reviewer cross-referencing the current NIST
        catalog finds SA-12 maps to something entirely unrelated.
        Fix required: replace "SA-12 (Supply Chain Protection)" with the appropriate
        Rev 5 SR-family control — SR-3 for supply chain process controls (lines 544
        and 607, module supply chain rules) and SR-3/SR-5 for provider supply chain
        (line 1117); update descriptions to match Rev 5 language.

      ISSUE 2 — OPA compliance Rego calls two undefined helper rules (CODE BUG / BLOCKING)
        The "Enforce Compliance Standards" Do example (lines 996-1017) contains a Rego
        policy in package terraform.compliance with two deny rules:
          deny[msg] { ... not has_kms_encryption(resource) ... }
          deny[msg] { ... not has_access_logging(resource) ... }
        Neither has_kms_encryption nor has_access_logging is defined anywhere in the
        shown code block or elsewhere in the file. In OPA/Rego, calling an undefined
        rule produces an undefined result (falsy). The consequence:
          - not has_kms_encryption(resource) is always TRUE
          - not has_access_logging(resource) is always TRUE
        The policy denies every PCI-scoped and every HIPAA-scoped S3 bucket regardless
        of whether encryption or logging is configured. The compliance guard is inverted
        and non-functional: it blocks compliant configurations and provides no actual
        compliance signal. A practitioner using this policy will either see all resources
        blocked or — if OPA evaluates the whole rule as undefined — have no enforcement.
        Fix required: define both helper rules within the same package block, e.g.:
          has_kms_encryption(resource) {
            rule := resource.change.after.server_side_encryption_configuration[_].rule[_]
            rule.apply_server_side_encryption_by_default.sse_algorithm == "aws:kms"
          }
          has_access_logging(resource) {
            resource.change.after.logging[_].target_bucket != ""
          }

      ISSUE 3 — PCI-DSS 3.2.1 cited at line 1042 — standard retired March 31, 2024 (STALE REF / BLOCKING)
        The "Enforce Compliance Standards" Refs line cites "PCI-DSS 3.2.1." PCI-DSS
        v3.2.1 was formally retired by the PCI Security Standards Council on March 31,
        2024 and superseded by PCI-DSS v4.0 (released March 2022, mandatory since
        April 2024). As of the audit date (2026-05-25), v3.2.1 has been retired for
        over 14 months. PCI-DSS v4.0 introduced updated requirements for
        authentication (Req 8), software security (Req 6), and monitoring (Req 10)
        not present in v3.2.1. Citing a retired version tells practitioners to target
        a superseded compliance baseline.
        Fix required: update "PCI-DSS 3.2.1" to "PCI-DSS v4.0" on line 1042; note
        specific v4.0 requirements if sub-requirement precision is intended (e.g.,
        Req 3.5 for encryption, Req 10.2 for access logging).

      ISSUE 4 — Multiple mutable action pins and a deprecated IaC scanner in Do examples (DEPRECATED MITIGATIONS)
        Four categories of mutable or deprecated tool references appear in Do examples:
        a) bridgecrewio/checkov-action@master at lines 856, 929, 950, 959, and 1243.
           "@master" is a mutable branch pin that changes silently on every push to
           the checkov-action repo. This is the exact vulnerable pattern flagged as
           CRITICAL in github-actions/CLAUDE.md (ISSUE 1) and cicd-security.md
           (ISSUE 1). A Do example must not teach the pattern the file's own strict
           Pin-by-SHA rules prohibit.
        b) tenable/terrascan-action@main at line 870 — same mutable branch pin.
        c) open-policy-agent/setup-opa@v2 with "version: latest" at lines 877-879.
           "version: latest" for the OPA binary is an unpinned runtime dependency
           that changes with each OPA release, contradicting the file's own provider
           and module version-pinning rules.
        d) aquasecurity/tfsec-action@v1.0.0 at lines 865 and 1240. AquaSecurity
           deprecated tfsec in October 2023 and officially recommends migration to
           aquasecurity/trivy-action, which provides IaC scanning alongside container
           and dependency scanning. tfsec no longer receives CVE signature updates
           and the tfsec-action repository is in maintenance-only mode.
        Fix required: SHA-pin all action references in Do examples (checkov-action,
        terrascan-action, setup-opa); replace tfsec-action with trivy-action;
        replace "version: latest" in setup-opa with a specific pinned OPA version.

      ISSUE 5 — Pulumi backend example places encryptionsalt in the project file (CONFIG BUG)
        Lines 30-38 show encryptionsalt in a config: stanza of what is formatted as
        the project-level Pulumi.yaml:
          name: my-project / runtime: python / backend: url: s3://...
          config: encryptionsalt: v1:abc123...
        In the Pulumi configuration model, encryptionsalt is a stack-level property
        stored in the stack configuration file (Pulumi.<stackname>.yaml), not in the
        project-level Pulumi.yaml. The project file does not accept encryptionsalt as
        a config key; placing it there has no effect and the passphrase encryption is
        silently not applied. A developer copying this example believes they have
        configured passphrase encryption when they have not. The encryptionsalt value
        is auto-generated by Pulumi when "pulumi stack init" is run with
        PULUMI_CONFIG_PASSPHRASE set; it appears in the stack file automatically.
        Fix required: remove encryptionsalt from the Pulumi.yaml example; show the
        correct stack file (e.g., Pulumi.dev.yaml) where encryptionsalt belongs, or
        document that PULUMI_CONFIG_PASSPHRASE drives passphrase encryption and the
        salt is managed automatically in the stack config.

      Non-blocking observations (no status change):
      - OPA CI step (line 881): "opa eval --data policies/ --input plan.json
        'data.terraform.deny[msg]'" produces output but does not exit non-zero when
        violations exist. Without "--fail-defined" or a non-empty check, the CI step
        passes even when policy violations are returned. The conftest command shown
        at line 1268 handles this correctly. Advisory: replace the opa eval invocation
        with "conftest test plan.json -p policies/" or add "--fail-defined".
      - SA-11 cited as "Developer Security Testing" at lines 658, 936, and 1292. In
        NIST 800-53 Rev 5, SA-11 was renamed to "Developer Testing and Evaluation."
        The control ID is correct; only the description string is marginally off.
        Advisory: update description to "Developer Testing and Evaluation."
      - CWE-1188 (Insecure Default Initialization of Resource) cited at line 739 for
        the drift detection rule. CWE-1188 is a hardware/firmware-focused weakness
        about insecure defaults; it is a stretch for configuration drift and change
        control. CWE-284 (Improper Access Control) would map more precisely. Not
        blocking — NIST CM-3 in the same Refs line is the load-bearing reference.
      - CWE-829 at line 544 (module pinning rule) creates inconsistency with lines
        658 and 1117 where CWE-1104 is used for equivalent supply chain rules in
        the same file. Advisory: replace CWE-829 with CWE-1104 at line 544.
      - Terraform required_version ">= 1.5.0, < 2.0.0" at line 1057 uses a three-
        year-old lower bound. The pinning pattern is correct; the specific version
        number is stale. Advisory only.
    issues_filed: []

  - path: rules/containers/helm/CLAUDE.md
    status: passed  # was: failed
    reviewed_by: rocklambros
    reviewed_on: 2026-05-26
    audit_coverage: full
    rules_audited:
      - No Hardcoded Secrets in Values Files
      - Secure Container SecurityContext Defaults
      - Resource Requests and Limits
      - Image Tag and Digest Pinning
      - Network Policy Integration
      - RBAC and ServiceAccount Least Privilege
      - Ingress TLS Enforcement
      - Chart Linting and Schema Validation
      - Sensitive Values Redaction and NOTES.txt
      - Dependency Management and Chart Provenance
    notes: |
      Audited all 10 rule sections. Three distinct blocking issues found; one is a
      broken CLI command (cosign missing required flag), one is a misleading OCI
      helm pull flag, and one is an image reference inconsistency between rules.
      No OWASP LLM taxonomy issues — this file uses CWE, CIS Kubernetes Benchmark,
      and NSA Kubernetes Hardening Guide refs throughout. No inline secrets appear
      in any Do example; secrets correctly use existingSecret or ExternalSecret
      patterns only. Chart.yaml uses apiVersion: v2 correctly. JSON Schema uses
      draft/2020-12 per Helm v3 documentation. Security context defaults
      (runAsNonRoot, readOnlyRootFilesystem, capabilities drop ALL,
      allowPrivilegeEscalation: false, seccompProfile RuntimeDefault) are correct
      and consistent with CIS Kubernetes Benchmark 5.2 and Pod Security Standards.

      ISSUE 1 — cosign verify missing required --certificate-identity flag (BROKEN Do / CRITICAL)
        Lines 863-865: the Do example for chart provenance verification is:
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            registry-1.docker.io/bitnamicharts/postgresql:16.4.5
        Since cosign v2.0 (released October 2023, current stable), --certificate-identity
        or --certificate-identity-regexp is REQUIRED when --certificate-oidc-issuer is
        set. Without it cosign v2+ exits with:
          "Error: --certificate-identity or --certificate-identity-regexp is required
          when --certificate-oidc-issuer is set."
        The command always fails on cosign v2.x, which is the version any user following
        current documentation will have installed. A developer copying this example gets
        an immediate error and is likely to remove the verification step entirely, which
        is worse than not teaching it. The correct pattern requires both issuer AND
        identity constraints:
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "https://github.com/bitnami/.*" \
            registry-1.docker.io/bitnamicharts/postgresql:16.4.5
        Fix required: add --certificate-identity or --certificate-identity-regexp to
        the cosign verify invocation; document that the identity value must match the
        actual signing workflow identity for the target chart publisher.

      ISSUE 2 — helm pull --verify does not work for OCI registries (MISLEADING Do)
        Line 872: helm pull oci://myregistry.io/charts/myapp --version 1.2.3 --verify
        Helm's --verify flag applies to classic HTTP chart repositories with GPG-signed
        .prov provenance files (the helm sign / helm verify workflow). For OCI
        registries, Helm does not perform cosign verification via --verify; OCI chart
        integrity verification is done entirely through the cosign CLI. Running
        helm pull oci://... --verify against an OCI registry that lacks a .prov file
        either silently succeeds without verifying anything (Helm < 3.13) or fails
        with "Error: failed to fetch provenance" (Helm 3.13+). Neither outcome achieves
        the intended security goal. The inline comment directly above the command states
        "Use OCI registries for charts (preferred over HTTP repos — integrity built in)"
        but then uses the HTTP-registry --verify flag, contradicting the OCI recommendation
        and implying a verification step that cannot function for OCI targets.
        Fix required: remove --verify from the helm pull OCI example; add a note that
        OCI chart integrity is verified via cosign verify (already shown in the block
        above at line 863); optionally show helm show chart with digest comparison
        to confirm the pulled content matches the expected digest.

      ISSUE 3 — SecurityContext rule deployment template uses tag-only image reference
        contradicting the Image Pinning rule in the same file (INCONSISTENT Do)
        Line 157 in the Secure Container SecurityContext Defaults Do example:
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        This uses a tag-only reference with no digest fallback. The Image Tag and
        Digest Pinning rule (lines 291-300 in the same file) correctly shows the
        digest-preferred conditional pattern using a >- block scalar and if/else.
        A developer working from the SecurityContext Do example gets a deployment
        template that ignores image.digest even if set in values-production.yaml.
        Two Do examples in the same file teach contradictory patterns for the same
        template fragment; a security-focused corpus must be self-consistent.
        Fix required: replace the tag-only image reference on line 157 with the
        digest-preferred conditional block already shown in the Image Pinning rule.

      Non-blocking observations (no status change):
      - checkov-action SHA at line 738: bridgecrewio/checkov-action@
        9e5a7f1c2d4b6a8f0c1e2d3b4a5f6c7d8e9f0a1b has no version comment
        (every other SHA pin in CI/CD rules carries a # vX.Y.Z annotation).
        Advisory: verify the SHA against the live checkov-action repo and add
        a version comment.
      - The >- block scalar for the digest-preferred image template (lines 294-300)
        may produce a leading space before the repository value depending on the
        Go template whitespace trimming context. Advisory: use a single-line
        conditional to avoid potential whitespace rendering ambiguity:
          image: "{{ if .Values.image.digest }}{{ .Values.image.repository }}@
          {{- .Values.image.digest }}{{ else }}{{ .Values.image.repository }}:
          {{- .Values.image.tag }}{{ end }}"
      - values.schema.json is shown as a jsonc (JSON with comments) fenced block
        (line 648). The // comment lines are not valid JSON and will cause parse
        errors if copied verbatim into a real values.schema.json file. Advisory:
        note that // comments are documentation-only and must be stripped from
        the actual file, or use an adjacent prose block for comments.
      - CIS Kubernetes Benchmark version not qualified in any Refs line (e.g.,
        "CIS Kubernetes Benchmark 5.2"). CIS Benchmark for Kubernetes is currently
        at v1.10 (December 2024); section numbers differ between versions.
        Advisory: add version qualifier e.g. "CIS Kubernetes Benchmark v1.10 §5.2".
      - Network Policy template (lines 391-395): namespaceSelector and podSelector
        are siblings under a single from[] entry, correctly implementing AND
        semantics (must be from that namespace AND that pod label). The template
        is correct; the indentation pattern that produces AND vs OR is subtle and
        worth a clarifying comment for practitioners who may misread it.

      RE-AUDIT 2026-05-26: Verified all blocking issues fixed. Status flipped failed -> passed.
      - ISSUE 1: cosign verify now includes --certificate-identity-regexp "https://github.com/bitnami/.*" with explanatory comment about cosign v2.0+ requirement.
      - ISSUE 2: helm pull OCI example no longer uses --verify; comment explains --verify is HTTP-repo-only and OCI integrity uses cosign verify shown above.
      - ISSUE 3: SecurityContext Do example image reference now uses digest-preferred conditional block (>- if .Values.image.digest) consistent with Image Pinning rule.
    issues_filed: []

  - path: rules/containers/_core/container-security.md
    status: passed  # was: failed
    reviewed_by: rocklambros
    reviewed_on: 2026-05-26
    audit_coverage: full
    rules_audited:
      - Minimal Base Images
      - Non-Root Container Execution
      - Image Vulnerability Scanning
      - Image Signing and Verification
      - No Secrets in Container Images
      - Read-Only Root Filesystem
      - Drop All Capabilities
      - Container Network Segmentation
      - Resource Limits
      - Container Health Checks
      - Supply Chain Security
      - Secure Container Registries
      - Runtime Security Monitoring
      - Audit Logging
      - Image Immutability
    notes: |
      Audited all 15 rule sections. Five distinct blocking issues found: three
      are code/syntax defects, one is a pervasive fabricated standards reference
      pattern, one is a deprecated command. An additional critical self-contradiction
      (the file violates its own supply-chain and immutability rules in Do examples)
      is documented under non-blocking observations.

      No OWASP LLM numbering issues — this file uses CIS Benchmarks, NIST 800-190,
      CWE, and SLSA. All CWE citations are valid. The file does not use the LLM taxonomy.

      ISSUE 1 — NIST 800-190 subsection numbers are entirely fabricated (STANDARDS MISMATCH / FILE-WIDE)
        NIST SP 800-190 (Application Container Security Guide) uses single-level
        subsections: 3.1, 3.2, 3.3, 3.4, 3.5 (image threats) and 4.1, 4.2, 4.3,
        4.4, 4.5 (platform threats). The specification contains no deeper subdivisions.
        Nine of the fifteen Refs lines cite invented subsections:
          4.2.1 (lines 121, 477) — does not exist; 4.2 = Unbounded Network Access
          4.2.2 (line 421) — does not exist
          4.2.3 (line 342) — does not exist
          4.2.4 (line 667) — does not exist
          4.3.2 (line 578) — does not exist; 4.3 = Insecure Runtime Configurations
          4.4.1 (line 745) — does not exist; 4.4 = App Vulnerabilities Within Containers
          4.4.2 (line 1047) — does not exist
        Additionally, two citations use the correct section number but wrong topic:
          "Section 3.3" (line 254, Image Signing) maps to "Embedded Malware" in NIST
          800-190; the correct section for untrusted/unverified images is 3.5
          "Use of Untrusted Images."
          "Section 3.4" (line 883, Secure Registries) maps to "Embedded Clear Text
          Secrets"; the relevant section for registry trust is 3.5.
        Fix required: replace all fabricated subsection numbers with the actual
        top-level sections they approximate (e.g., 4.2.1 -> 4.3, 4.3.2 -> 4.3,
        4.4.1/4.4.2 -> 4.4); update image signing and registry refs to 3.5; add
        version qualifier "NIST SP 800-190" consistently.

      ISSUE 2 — CIS Docker Benchmark 4.7 is wrong section for Image Immutability (CIS REF MISMATCH)
        Line 1116 (Image Immutability Refs) cites "CIS Docker Benchmark 4.7."
        In CIS Docker Benchmark v1.6.0, section 4.7 is "Do not use update instructions
        alone in the Dockerfile" — this addresses cache staleness when apt-get update
        appears without apt-get install on the same layer. It has no relationship to
        mutable image tags or production deployment immutability. Practitioners who
        look up CIS 4.7 find a completely different control.
        Fix required: replace "CIS Docker Benchmark 4.7" with a correct reference such
        as the NIST 800-190 Section 3.2 (Image Configuration Defects) guidance on
        image pinning, or remove the CIS section number if no section maps cleanly.

      ISSUE 3 — Falco rules reference undefined lists; glob in 'in' operator is a logic bug
        (CODE DEFECT — Runtime Security Monitoring rule)
        The three Falco rules in the Runtime Security Monitoring Do example (lines 896-929)
        reference four user-defined lists: expected_processes, expected_parent_processes,
        shell_binaries, and allowed_shell_parents. Of these, shell_binaries is a Falco
        built-in; the other three are not. Falco refuses to load a ruleset that references
        undefined lists, so these rules cannot be applied; the user receives a Falco
        compilation error on load. The Do example as written is non-functional.
        Additionally, the Sensitive File Access rule (lines 920-929) conditions on:
          fd.name in (/etc/shadow, /etc/passwd, /etc/kubernetes/*)
        Falco's "in" operator performs exact string matching. The pattern /etc/kubernetes/*
        matches only the literal string "/etc/kubernetes/*" and no actual file under that
        directory. Every kubeconfig, service account token, and PKI file under
        /etc/kubernetes/ silently escapes the rule. The correct idiom is:
          fd.name startswith "/etc/kubernetes/"
        Fix required: add skeleton list definitions for expected_processes,
        expected_parent_processes, and allowed_shell_parents before the rule blocks;
        replace "fd.name in (/etc/kubernetes/*)" with
        "fd.name startswith '/etc/kubernetes/'".

      ISSUE 4 — github/codeql-action/upload-sarif@v2 is end-of-life (DEPRECATED TOOLING)
        Line 156 (Image Vulnerability Scanning Do example):
          uses: github/codeql-action/upload-sarif@v2
        codeql-action v2 reached end-of-life in November 2023. GitHub Actions jobs
        using v2 now fail with an error on modern runners. The Do example as written
        is non-functional for any pipeline that follows it today. v3 is a drop-in
        replacement with no breaking API changes for upload-sarif usage.
        Fix required: update to "github/codeql-action/upload-sarif@v3".

      ISSUE 5 — cosign sign --oidc-issuer flag removed in cosign v2.x (DEPRECATED MITIGATION)
        Line 212 (Image Signing and Verification Do example):
          cosign sign --oidc-issuer=https://token.actions.githubusercontent.com \
            myregistry.io/myapp:v1.0.0
        The --oidc-issuer flag was a cosign v1.x experimental-keyless parameter.
        cosign v2.0 (released June 2023) promoted keyless signing to stable and removed
        --oidc-issuer from the sign subcommand. In cosign v2.x, passing this flag
        produces "unknown flag: --oidc-issuer", making the Do example non-functional.
        The correct cosign v2.x keyless sign syntax in CI is simply:
          cosign sign myregistry.io/myapp:v1.0.0
        (OIDC token is auto-detected from the GitHub Actions environment.)
        Note: the file's Supply Chain Security rule (lines 804-807) correctly uses
        --certificate-oidc-issuer on cosign verify-attestation, which is valid in v2.x.
        Only the sign-time usage is broken.
        Fix required: remove --oidc-issuer from the sign command; add a comment that
        OIDC is auto-detected in CI and reference the cosign v2 migration guide.

      Non-blocking observations (no status change):
      - Self-contradiction in Do examples: Runtime Security Monitoring deploys Falco
        with image: falcosecurity/falco:latest (line 946), directly violating the
        Image Immutability rule in the same file (lines 1104-1115) which lists :latest
        as a VULNERABLE pattern. Additionally, the Image Vulnerability Scanning Do
        example uses aquasecurity/trivy-action@master (line 147), an unpinned mutable
        branch reference — which the Supply Chain Security rule in the same file exists
