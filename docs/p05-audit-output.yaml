    notes: |
      Audited all 8 rule sections. One blocking defect found.

      ISSUE 1 — Cryptography Do example: CipherMode.GCM does not exist (CODE BUG / CRITICAL)
        Lines 158-159 of the "Use Strong Cryptographic Algorithms" Do example:
          using var aes = Aes.Create();
          aes.KeySize = 256;
          aes.Mode = CipherMode.GCM;
        CipherMode is System.Security.Cryptography.CipherMode, an enum whose members are
        CBC, ECB, OFB, CFB, and CTS. GCM is not a member of this enum. This code will
        not compile; the compiler emits CS0117 ("CipherMode does not contain a definition
        for 'GCM'"). AES-GCM in .NET requires the separate System.Security.Cryptography.AesGcm
        class (available since .NET Core 3.0 / .NET 5+), which handles nonce, ciphertext,
        and tag as distinct byte arrays and does not use CipherMode at all. The example
        teaches a pattern that is broken at compile time and architecturally incorrect.
        Fix required: replace the Aes.Create()/CipherMode.GCM block with an AesGcm example:
          var key = new byte[32];
          RandomNumberGenerator.Fill(key);
          var nonce = new byte[AesGcm.NonceByteSizes.MaxSize]; // 12 bytes
          RandomNumberGenerator.Fill(nonce);
          using var aesGcm = new AesGcm(key, AesGcm.TagByteSizes.MaxSize);
          var tag = new byte[AesGcm.TagByteSizes.MaxSize]; // 16 bytes
          aesGcm.Encrypt(nonce, plaintext, ciphertext, tag);

