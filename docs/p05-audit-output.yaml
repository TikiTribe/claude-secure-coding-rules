  - path: rules/languages/ruby/CLAUDE.md
    status: failed
    reviewed_by: rocklambros
    reviewed_on: 2026-05-26
    audit_coverage: full
    rules_audited:
      - Use Parameterized Queries
      - Prevent Command Injection
      - Avoid Unsafe Deserialization
      - Use Strong Cryptographic Algorithms
      - Validate File Paths
      - Prevent ReDoS Attacks
      - Don't Expose Stack Traces
      - Use Strong Parameters
    notes: |
      Audited all 8 rule sections. Two blocking issues found: one is a misleading
      Do example (command injection rule), one is missing coverage of two mandatory
      Ruby-specific topics. Standards refs are otherwise clean.

      ISSUE 1 — Command Injection Do example: Shellwords.escape passed to array-form system (MISLEADING / BLOCKING)
        Line 67: system('echo', Shellwords.escape(user_input))
        The array-form of system() (passing arguments as separate elements) does NOT
        invoke the shell. No shell metacharacter interpretation occurs; the OS executes
        the binary directly with the argument string as-is. Applying Shellwords.escape
        to an argument that will never be interpreted by a shell is redundant and teaches
        a false mental model: developers will incorrectly believe escaping is required
        when using the array form. Worse, if user_input contains special characters that
        Shellwords escapes (e.g., quotes, spaces), those escape sequences are passed
        literally to the program as part of the argument value, corrupting the input.
        Shellwords escaping is only meaningful for the single-string form of system()/exec()
        where the shell parses the command string.
        Fix required: remove Shellwords.escape from the array-form system() call; keep the
        comment noting that array form avoids shell invocation, which IS the correct lesson.
        Show Shellwords.escape only in the context where it is appropriate: building a
        single-string shell command when array form is unavailable.

      ISSUE 2 — Missing mandatory Ruby-specific topics: metaprogramming and ERB injection (COVERAGE GAP / BLOCKING)
        The audit checklist for Ruby-specific rules requires coverage of:
          (a) Metaprogramming risks: eval(), send() with untrusted input, define_method,
              class_eval, instance_eval with user-controlled strings. These are Ruby's
              highest-severity code execution vectors and are absent from the file.
          (b) ERB injection: HTML-safe vs raw output in ERB templates (html_safe,
              raw(), <%== %>). In Rails, calling String#html_safe or raw() on user input
              bypasses Rails' automatic XSS escaping and enables stored XSS. This pattern
              is unique to Ruby/Rails and absent from the file.
        The file covers SQL injection, command injection, deserialization, crypto, path
        traversal, ReDoS, error handling, and mass assignment but the two mandatory
        Ruby-specific metaprogramming and ERB topics are unrepresented.
        Fix required: add a 'Metaprogramming Safety' rule covering eval/send/class_eval
        with untrusted input (CWE-94, OWASP A03:2025); add an 'ERB Output Encoding' rule
        covering html_safe/raw misuse (CWE-79, OWASP A03:2025).

      Non-blocking observations (no status change):
      - YAML.safe_load with permitted_classes: [Symbol, Date] is correct Ruby 3.1+ API.
        The deprecated whitelist_classes: keyword (Ruby <3.1) is not present. Good.
      - BCrypt::Password.create cost: 12 is acceptable; Argon2id is now OWASP A04:2025
        first-choice but bcrypt remains standard-compliant. Advisory only.
      - No version guidance present. Ruby 2.7 EOL 2023-03-31; 3.0 EOL 2024-03-31.
        File implies Ruby 3.x (YAML permitted_classes: syntax) but states no minimum.
