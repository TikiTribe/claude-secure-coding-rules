  - path: rules/_core/graph-database-security.md
    status: passed
    reviewed_by: rocklambros
    reviewed_on: 2026-05-25
    audit_coverage: full
    rules_audited:
      - Use Parameterized Cypher Queries (Neo4j)
      - Use Parameterized Gremlin Queries (Neptune)
      - Use Parameterized AQL Queries (ArangoDB)
      - Restrict APOC Procedures
      - Implement Graph Traversal Controls
      - Control Graph Algorithm Execution
      - Implement Tenant Isolation in Graph Databases
      - Secure Graph Data Export and Import
      - Implement Graph Database Audit Logging
    notes: |
      Audited all 9 rule sections across 7 categories. Five distinct issues found; four
      are blocking. No OWASP LLM 2023->2025 numbering problem in this file — it uses
      OWASP Top 10 (web application) refs (A01, A03, A08, A09), not the LLM taxonomy.
      Those refs use correct 2025 qualifiers throughout. MITRE ATLAS is not cited here.

      ISSUE 1 — Cypher rule Do example: label parameterization is invalid Cypher (CODE BUG / CRITICAL)
        Line 33: the Do example issues MATCH (n:$label {name: $name}) with label=$entity_type
        in the parameter map. Cypher does not support parameterized node labels — parameters
        can only bind property values, not structural elements like label names or relationship
        types. session.run() with label as a parameter will raise a Neo4j ClientError:
        "SyntaxError: Invalid input '$': expected an identifier" when it encounters :$label
        in the query string. The comment on line 36 ("# Note: labels need special handling")
        acknowledges the issue but the provided code still attempts the invalid syntax and
        provides no working alternative. The actual secure pattern requires validating the
        label against a whitelist and then using string formatting (e.g., f"MATCH (n:{label}
        {{name: $name}})" after whitelist check) — the Do example neither shows this pattern
        nor uses it. A developer copying this example will get a runtime error every time.
        Fix required: replace the invalid :$label with a whitelist-validated label interpolated
        after validation, e.g.:
          ALLOWED_LABELS = {"Person", "Concept", "Document"}
          if entity_type not in ALLOWED_LABELS:
              raise ValueError(...)
          result = session.run(
              f"MATCH (n:{entity_type} {{name: $name}}) RETURN n.name, n.embedding, n.content",
              name=entity_name
          )

      ISSUE 2 — Graph Traversal Controls Do example: relationship types injected via f-string (CODE BUG / CRITICAL)
        Lines 453-462: SecureGraphTraversal.traverse() builds the relationship filter with:
          rel_types = "|".join(policy.allowed_relationships)
          rel_filter = f":{rel_types}"
        and then injects rel_filter directly into the Cypher string:
          f"MATCH path = (start {{id: $start_id}})-[r{rel_filter}*1..$depth]-(end)"
        The allowed_relationships set in TraversalPolicy has a default of None, but the code
        never validates the contents of the set against a server-side whitelist of permitted
        relationship type names. If allowed_relationships is populated from external input
        (e.g., a user-supplied API request for which relationships to include), the f-string
        injection opens a Cypher structural injection path. An attacker supplying a relationship
        value like "RELATES_TO|*" or "X]->(sensitive) MATCH (s" would alter the query structure.
        The depth and limit parameters are correctly parameterized, making this inconsistency
        worse: the example teaches mixed-mode safety that developers will not reliably apply.
        Fix required: add a server-side ALLOWED_RELATIONSHIPS whitelist and validate every
        element of policy.allowed_relationships against it before constructing rel_filter;
        document that label and relationship names can never be parameterized in Cypher and
        must always be whitelisted before interpolation.

      ISSUE 3 — Export/Import _import_data: label and relationship type injected without validation (CODE BUG / CRITICAL)
        Lines 930-952: SecureGraphExport._import_data() imports nodes using:
          labels = ":".join(node["labels"])
          session.run(f"CREATE (n:{labels}) SET n = $props", ...)
        and imports relationships using:
          session.run(f"CREATE (s)-[r:{rel['type']}]->(e) SET r = $props", ...)
        Both labels (from node["labels"] in the import file) and rel['type'] (from the import
        file) are injected directly into Cypher query strings. Even though the import package
        is encrypted and integrity-checked, the import file was originally produced by the
        same export routine which accepts externally-sourced graph data. A malicious node label
        in the export file such as "Foo) WITH 1 AS x CALL apoc.cypher.run..." would execute
        arbitrary Cypher during import. This structural injection bug exists in the "Do" example
        — the code that is supposed to illustrate safe practice.
        Fix required: validate node["labels"] entries and rel['type'] against an allowed-label
        and allowed-relationship-type whitelist before constructing the CREATE query, e.g.:
          ALLOWED_IMPORT_LABELS = {"Entity", "Concept", "Document"}
          for label in node["labels"]:
              if label not in ALLOWED_IMPORT_LABELS:
                  raise SecurityError(f"Disallowed label in import: {label}")

      ISSUE 4 — Multiple undefined exception classes across five rule blocks (CODE BUG)
        The following custom exception classes are raised in Do examples but never defined
        or imported anywhere in the file:
          SecurityError — raised in SecureAPOCUsage.use_apoc_procedure() (line 368),
            EncryptedPropertyHandler.encrypt_property() (line 764),
            EncryptedPropertyHandler.decrypt_property() (line 773),
            SecureGraphExport.import_graph() (lines 904, 910)
          ResourceError — raised in SecureGraphAlgorithms.run_node2vec() (line 562)
        Both are undefined Python names. Any code path that triggers these raises
        NameError rather than the intended exception. In SecureGraphAlgorithms, the
        ResourceError guard is the only control preventing runaway algorithm execution
        on oversized graphs — a NameError at that point leaves the execution unchecked.
        Fix required: add class definitions (e.g., class SecurityError(Exception): pass,
        class ResourceError(Exception): pass) at the top of each block that uses them,
        or import them from a shared module; same file-wide pattern seen in rag-security.md.

      ISSUE 5 — Neptune Gremlin semantic_search: fabricated Gremlin predicate (CODE BUG / CRITICAL)
        Lines 165-172: the semantic_search() method submits a Gremlin traversal that uses:
          .where(__.values('embedding').is(P.within(embedding).by(similarity)))
        P.within() in TinkerPop/Gremlin accepts a collection of discrete values for
        membership testing — it is not a vector similarity function. Calling
        P.within(embedding).by(similarity) is not valid Gremlin syntax; P predicates do
        not have a .by() modulator. This traversal will raise a GremlinServerError
        ("Could not parse the traversal") in all standard Gremlin-compatible engines
        including Amazon Neptune. Neptune Analytics (the graph DB with vector search
        support) uses openCypher vector functions or the Neptune ML API — not this
        fabricated Gremlin predicate. The semantic_search Do example has never worked
        and cannot be adapted into a working form without replacing the traversal logic.
        Fix required: replace with a valid Neptune vector search approach, e.g. using
        the Neptune Analytics openCypher VECTOR_SIMILARITY() function or the Gremlin
        withSideEffect pattern for k-NN, and verify the syntax compiles against the
        Neptune or Memgraph Gremlin server before publishing.

      Non-blocking observations (no status change):
      - APOC Procedure restriction rule: the whitelist in ALLOWED_PROCEDURES contains
        'apoc.convert.toJson', 'apoc.text.clean', etc. but the allowlist in neo4j.conf
        (line 348) only covers apoc.coll.*, apoc.convert.*, apoc.text.*, and
        apoc.cypher.runFirstColumn. The Python-level and conf-level allowlists should
        agree; apoc.cypher.runFirstColumn in the conf allows dynamic Cypher via a
        first-column result — this is a meaningful expansion of trust that deserves
        explicit justification in the Why text.
      - CWE-200 (Information Exposure) cited in Graph Algorithm Security (line 664)
        and Quick Reference (line 1207): CWE-200 is the top-level parent; NVD and
        MITRE now prefer child nodes (CWE-359 for personally identifiable information,
        CWE-497 for system data exposure). Not blocking but the child CWE is more
        precise.
      - MultiTenantGraphClient.traverse_within_tenant() uses WHERE ALL(node IN nodes(path)
        WHERE node.tenant_id = $tenant_id) which enforces tenant boundary in the path.
        However, the MATCH clause still allows traversal start nodes to be found
        from any database (the session does not use the tenant-scoped database).
        The dual-layer approach (per-tenant DB + tenant_id property filter) is
        correct only if both layers are active; the example uses only property
        filtering in this method while the database isolation is shown in a
        separate method. A code reviewer might incorrectly infer property-only
        filtering is sufficient. Advisory: add a comment noting that property-
        based filtering alone is insufficient and must be combined with database-
        level isolation.
      - Audit logging rule uses hashlib.md5() for query_id generation (line 1113).
        MD5 is acceptable for non-cryptographic ID generation but the use of
        hashlib.md5() alongside time.time() (floating-point, low entropy) produces
        weak uniqueness. Use uuid.uuid4() for collision-resistant audit IDs.
        Advisory only — does not affect security of the logged data itself.

      Re-audited 2026-05-25 after P0.7 rewrite (commit b7349c2): all 5 defects verified fixed.
      ISSUE 1 (_ALLOWED_NODE_LABELS): defined as frozenset at top of file (line 60);
        find_entity validates entity_type against it before f-string substitution.
      ISSUE 2 (_ALLOWED_RELATIONSHIP_TYPES): defined as frozenset (line 491);
        SecureGraphTraversal.traverse validates policy.allowed_relationships against it.
      ISSUE 3 (invalid Cypher :$label): no 'MATCH (n:$label' pattern anywhere; label is
        validated then f-string substituted only after allowlist check.
      ISSUE 4 (fake Gremlin P.within): removed entirely; semantic_search replaced with
        external-vector-store pattern (query external store for IDs, then Gremlin by ID).
      ISSUE 5 (SecurityError/ResourceError): both defined in '## Common Exception Classes'
        block (lines 25, 29); _import_data validates labels and rel types against frozensets
        before any CREATE query construction.
    issues_filed: []

  - path: rules/cicd/gitlab-ci/CLAUDE.md
    status: passed
    reviewed_by: rocklambros
    reviewed_on: 2026-05-25
    audit_coverage: full
    rules_audited:
      - Protected Variables - Mask and Protect Secrets
      - Runner Security - Tags and Isolation
      - Include Security - Trusted Sources Only
      - Vault Integration - Dynamic Secrets
      - Security Scanning - SAST/DAST/Container
      - Merge Request Approvals - Required Reviews
      - Protected Branches and Tags - Access Control
      - Artifact Security - Expiration and Signing
      - Environment-Specific Variables - Scoped Secrets
      - Pipeline Security - Prevent Override
      - Secure Files - Sensitive File Storage
      - Compliance Pipelines - Enforced Security Jobs
    notes: |
      Audited all 12 rule sections. Four distinct blocking issues found; two are critical
      (invalid YAML, wrong-platform API call). Pervasive deprecated-syntax issue affects
      nearly every Do example.

      ISSUE 1 — Pervasive use of deprecated only/except syntax (DEPRECATED MITIGATION)
        At least 12 locations across the file use the 'only:' keyword
        (lines 44, 79, 90, 193, 434, 907, 1016, 1029, and others). GitLab CI/CD
        deprecated 'only' and 'except' in favour of 'rules:' syntax in GitLab 12.3
        and formally recommends migration in current docs. The 'only/except' keywords
        remain functional but are no longer the recommended pattern and will confuse
        developers following modern GitLab documentation. Security-specific rules
        (e.g., "deploy only on main" at lines 43-45 and 89-90) need the richer
        conditional expressions that 'rules:' provides (protected-branch checks,
        pipeline source constraints). Presenting 'only:' in Do examples actively
        teaches the deprecated pattern.
        Fix required: replace all 'only:' and 'except:' keyword usage in Do examples
        with 'rules: - if:' equivalents; retain 'only:' only in Don't examples if
        needed to show contrast with the modern form.

      ISSUE 2 — Protected Branches rule: rules: and only: combined in same job (INVALID YAML / CRITICAL)
        Lines 826-829 of the 'Protected Branches and Tags' Do example contain a single
        job ('release:') that uses BOTH 'rules:' (lines 826-827) AND 'only:' (line 828).
        GitLab CI/CD explicitly prohibits mixing these two keywords in the same job;
        any pipeline attempting to load this configuration raises a YAML validation error:
          "rules: cannot be used with only/except"
        The job is entirely skipped (GitLab marks the pipeline as invalid). A Do example
        that prevents the pipeline from loading at all cannot teach secure practice.
        Fix required: remove 'only: - tags' (line 828-829); the 'rules: - if:
        $CI_COMMIT_TAG =~ ...' already restricts the job to matching tags.

      ISSUE 3 — Vault Integration: GitHub Actions ::add-mask:: syntax in GitLab CI Do example (WRONG PLATFORM / CRITICAL)
        Line 496 inside the 'Alternative: Using Vault CLI in scripts' Do block contains:
          - echo "::add-mask::$DATABASE_PASS"
        The '::add-mask::' prefix is a GitHub Actions workflow command (actions/core
        set-secret). It is not a GitLab CI construct; in a GitLab runner it emits the
        literal string "::add-mask::$DATABASE_PASS" to stdout without masking anything.
        The DATABASE_PASS value remains unmasked in the GitLab job log. This is the
        exact opposite of the intended behavior: a Do example that claims to mask the
        secret actually fails to mask it in the GitLab context.
        The GitLab-native approach is to mark the CI variable as Masked in the UI
        (or via the API), or to avoid ever printing the value. There is no
        runner-side runtime masking API equivalent to GitHub's ::add-mask:: in GitLab
        CI at the script level.
        Fix required: remove the echo "::add-mask::..." line; add a comment explaining
        that GitLab runtime masking is configured on the variable definition (Masked
        flag in Settings > CI/CD > Variables), not via a script command; reference
        GitLab's CI_JOB_TOKEN scoping as the preferred approach for Vault JWT auth
        rather than script-level log manipulation.

      ISSUE 4 — Artifact Security: SLSA Level 4 citation is stale (STALE REF)
        Line 761 in 'Merge Request Approvals' Refs cites "SLSA Level 4: Two-person
        Review." SLSA v1.0 (released 2023) removed Level 4 entirely from the
        framework; the model now uses Levels 1 through 3. The two-person review
        requirement that was in the draft Level 4 was not carried forward into the
        v1.0 specification. Citing a non-existent SLSA level as a normative reference
        undermines practitioner trust. The closest v1.0 equivalent is the combination
        of SLSA Build L3 (isolated builds) with the separate "Roles and Personnel"
        best practice, but SLSA v1.0 does not mandate two-person review as a numbered
        level requirement.
        Fix required: replace "SLSA Level 4: Two-person Review" with a reference to the
        two-person rule concept from NIST SSDF (PW.1.3) or the GitLab-specific
        "Required approvals" documentation; update any SLSA Level 2/3 citations in
        Artifact Security to confirm they match SLSA v1.0 track-level language.

      Non-blocking observations (no status change):
      - Include Security Don't example (lines 376-381): The 'Auto-DevOps.gitlab-ci.yml'
        built-in template is grouped under a "# VULNERABLE:" code block header alongside
        a remote URL include and an unpinned external project reference. The inline comment
        concedes "Built-in templates are generally safe but should be reviewed," which
        contradicts the VULNERABLE label applied to the entire block. Auto-DevOps is a
        GitLab-maintained template pinned to the current GitLab release and is not an
        external or untrusted include. Grouping it with a remote:external-site.com include
        as equally "VULNERABLE" is misleading and may cause teams to avoid a useful
        security-relevant feature. Advisory: move the Auto-DevOps note to a separate
        "Caution" callout or move it to the Do example with qualification; do not label
        it alongside untrusted remote includes.
      - Security Scanning rule (line 622): uses 'owasp/zap2docker-stable' Docker image.
        The OWASP ZAP project retired the 'owasp/' Docker Hub namespace; the current
        maintained image is 'zaproxy/zap-stable'. Using the retired image will pull
        an unmaintained version that no longer receives CVE patches. Advisory: update
        to zaproxy/zap-stable.
      - Protected Variables Do examples (lines 43-45, 79, 90): use 'only: - main' and
        'only: - develop'. These are legacy syntax (see ISSUE 1). Additionally, the
        protected-variable scoping relies solely on the variable's Protected flag in
        the UI. The YAML alone cannot enforce protection; the advisory comment
        explaining this requirement is absent from the Do example, which may mislead
        readers into thinking the YAML 'only: - main' restriction is the protection
        mechanism. The actual protection comes from marking the branch as Protected AND
        the variable as Protected in Settings. A comment clarifying this separation
        would strengthen the Do example.
      - CICD-SEC references (CICD-SEC-1 through CICD-SEC-7): verified against OWASP
        CI/CD Security Top 10 published taxonomy. All cited CICD-SEC-N numbers and
        short names are accurate: CICD-SEC-1 (Insufficient Flow Control Mechanisms),
        CICD-SEC-3 (Dependency Chain Abuse), CICD-SEC-4 (Poisoned Pipeline Execution),
        CICD-SEC-6 (Insufficient Credential Hygiene), CICD-SEC-7 (Insecure System
        Configuration). No numbering errors in the OWASP CI/CD Top 10 refs.
      - Runner Security Kubernetes config (lines 198-222): The 'read_only_root_filesystem
        = true' setting is correct; however, the TOML block has an empty
        '[runners.kubernetes.affinity]' section with only a comment, which is
        syntactically valid TOML but incomplete. Readers may assume affinity rules
        are configured when they are not. Advisory: either populate the affinity block
        with a practical example or remove the empty section.
      Re-audited 2026-05-25 after P0.7 rewrite (commit 4c539d7): all 4 defects verified fixed.
      ISSUE 1: grep -c "^  only:" returns 0 — all deprecated only/except syntax replaced with rules: blocks.
      ISSUE 2: release: job at original lines 826-829 now uses only rules: with no mixed only: keyword.
      ISSUE 3: grep "::add-mask::" returns no output — GitHub Actions syntax removed.
      ISSUE 4: grep "SLSA Level 4" returns no output — replaced with "SLSA v1.1 Build L3".
      Carry-over (non-blocking, pre-existed P0.7): SLSA Level 2 at line 972 and PS.3 description
      "Maintain Provenance Data" at line 973 — these were not blocking defects in the original
      gitlab-ci audit and are unchanged advisory items.
    issues_filed: []

