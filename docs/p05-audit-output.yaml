      format string injection, command injection, timing attacks).

      ISSUE 1 — Prevent Buffer Overflows Do example: strncpy in a Do block (SELF-CONTRADICTION / BLOCKING)
        Lines 84-88 present a safe_copy() helper in the Do block:
          void safe_copy(char* dest, size_t dest_size, const char* src) {
              strncpy(dest, src, dest_size - 1);
              dest[dest_size - 1] = '\0';
          }
        strncpy is the function class this rule exists to prohibit. The Don't block
        (line 94) flags strcpy as "VULNERABLE: Stack buffer overflow." The Do block
        then introduces strncpy, which shares the hazard class: it does not
        null-terminate when src length equals dest_size - 1, it zero-pads when src
        is shorter, and it is banned under Microsoft SDL and MISRA C. Modern C++
        replaces char* buffers with std::string; when a raw char* destination is
        unavoidable, snprintf(dest, dest_size, "%s", src) is the accepted replacement
        per SEI CERT C STR07-C. Using strncpy in the Do block contradicts the rule
        intent and teaches a pattern still considered unsafe by current secure coding
        standards.
        Fix required: remove safe_copy() / strncpy from the Do block; replace with a
        std::string-based copy example, or if a char* destination is required show
        snprintf(dest, dest_size, "%s", src) with a null-termination note.

      Non-blocking observations (no status change):
      - SafeInt.hpp (integer overflow Do example, line 192): assumes Microsoft SafeInt
        install. A comment with the library URL (github.com/dcleblanc/SafeInt) would
        aid practitioners. Advisory only.
      - std::span (C++20) absent from buffer overflow rule as a bounds-safe view type
        for function arguments. Advisory only.
      - Command injection Do example uses POSIX fork/execlp. Correct on POSIX but
        non-portable to Windows. Advisory only.

