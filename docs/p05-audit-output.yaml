audited_rules:
  - path: rules/_core/owasp-2025.md
    status: failed
    reviewed_by: rocklambros
    reviewed_on: 2026-05-25
    notes: |
      Audited all 10 rules (one per A01-A10 category, with A01 containing two rules).
      11 rule sections checked in total. Four distinct issues found:

      ISSUE 1 — A01 SSRF rule: logic bug in Do example (CRITICAL)
        The validate_url() function checks whether parsed.hostname is a private/loopback IP,
        but the exception it raises (ValueError) is caught by the same except clause that
        handles "not an IP literal" cases. The line `raise ValueError("Internal addresses
        blocked")` inside the try block is silently swallowed by `except ValueError: pass`,
        making the private-IP guard a no-op. An attacker supplying a private IP literal
        (e.g. http://192.168.1.1) passes the allowlist check (it is not in ALLOWED_HOSTS,
        so validate_url raises ValueError("Host not allowed") before reaching the IP check)
        but an IP-literal that IS allowlisted would bypass the private-IP guard entirely.
        Additionally the allowlist-first design does not defend against DNS rebinding: an
        allowlisted FQDN could resolve to an internal address at fetch time because no
        post-resolution IP check is performed.
        Fix required: restructure the IP-literal check so its ValueError is not caught by
        the hostname-parsing except; add a post-DNS-resolution IP check via socket.getaddrinfo.

      ISSUE 2 — A04 crypto rule: bcrypt as lead Do recommendation, not Argon2id (STANDARDS GAP)
        The Do example leads with bcrypt (rounds=12). OWASP A04:2025 now explicitly recommends
        Argon2, yescrypt, scrypt, or PBKDF2-HMAC-SHA-512 as first-choice algorithms; bcrypt
        is described as legacy-acceptable with "additional consultation recommended." Presenting
        bcrypt as the primary Do example contradicts OWASP 2025's stated hierarchy. Argon2id
        should be the lead example, with bcrypt noted as a legacy-acceptable alternative.
        The PBKDF2HMAC derive_key() helper in the same Do block uses SHA-256 (not SHA-512),
        which is below the OWASP-recommended PBKDF2-HMAC-SHA-512 variant.
        Fix required: replace bcrypt lead with argon2-cffi (Argon2id); note bcrypt as
        legacy-acceptable; update derive_key to use hashes.SHA512() with >=600000 iterations.

      ISSUE 3 — A06 insecure design rule: CWE-840 not in official A06:2025 mapping (REF ERROR)
        The Refs line cites CWE-840 (Business Logic Errors). The OWASP A06:2025 page does not
        map CWE-840 to this category. A06 maps 39 CWEs covering privilege management,
        credential storage, trust boundaries, and upload restrictions — not business logic.
        Fix required: replace CWE-840 with a CWE that appears in the official A06:2025
        mapping, e.g. CWE-269 (Improper Privilege Management) or CWE-501 (Trust Boundary
        Violation).

      ISSUE 4 — A07 authentication rule: session.regenerate() does not exist in Flask (BROKEN Do)
        The Do example calls session.regenerate() on Flask's session proxy object. Flask's
        session object is a dict-like proxy (SecureCookieSession) with no regenerate() method.
        This call raises AttributeError at runtime. The correct Flask pattern for session
        fixation prevention is session.clear() followed by assigning new values; actual session
        ID rotation requires flask-login's login_user() or a custom session interface.
        Fix required: remove session.regenerate() and replace with a comment explaining that
        Flask regenerates the session cookie automatically when session.clear() is called and
        new values are set, or show the flask-login pattern.

      Non-blocking observations (no status change):
      - A02 Refs cite CWE-209 (Information Exposure Through Error Messages); CWE-209 does not
        appear in the official A02:2025 CWE mapping (16 CWEs), though it is present in A10.
        The Don't example illustrates CWE-209 behavior, making it misleading under A02.
        Recommend moving CWE-209 reference to the A10 rule where it is officially mapped.
      - A03 Refs cite CWE-829 (Inclusion of Functionality from Untrusted Control Sphere).
        The OWASP A03:2025 page maps CWE-1357, CWE-1395, CWE-1104, CWE-447, CWE-1329,
        CWE-1035. CWE-829 is not in that list; it belongs to A08 (Integrity Failures).
        Recommend replacing with CWE-1395 or CWE-1357.
      - A05 Refs cite CWE-79 (XSS) but the Do/Don't examples show only SQL and OS-command
        injection. No XSS example is present. Either add an XSS Do/Don't pair or drop CWE-79
        from Refs to avoid implying coverage that is not demonstrated.
      - A08 OWASP page returned 404 on both URL variants tested; CWE mapping could not be
        independently verified from the live site. CWE-502 and CWE-829 citations in A08 Refs
        appear reasonable based on the 2021 predecessor category, but are unverified against
        the 2025 RC1 mapping.
    issues_filed: []

  - path: rules/_core/ai-security.md
    status: failed
    reviewed_by: rocklambros
    reviewed_on: 2026-05-25
    notes: |
      Audited all 10 rule sections across 5 categories (Data Security, Model Security,
      Inference Security, LLM Security, Infrastructure Security, Monitoring).
      Four distinct issues found; two are blocking, two are serious but secondary.

      ISSUE 1 — Prevent Prompt Injection: denylist as primary Do mitigation (CRITICAL)
        The _sanitize_input() method in the "Prevent Prompt Injection" Do example
        implements a regex denylist (patterns_to_remove = ['ignore previous
        instructions', 'you are now', ...]) as the primary injection defense.
        OWASP LLM01:2025 explicitly de-emphasizes simple pattern matching in favor of
        structural isolation (separate system/user roles in the message array),
        semantic filters, privilege control, and human-in-the-loop for high-risk
        actions. The denylist patterns shown are trivially bypassed by encoding,
        paraphrasing, Unicode substitution, or multilingual injection. Presenting this
        as a Do example teaches a false sense of security and directly contradicts the
        current standard. The structural isolation pattern (using the messages array to
        separate system prompt from user content, as the outer generate() method already
        does) is the correct primary defense; the denylist should be removed or
        demoted to a comment noting its severe limitations.
        Fix required: remove _sanitize_input denylist; make structural role isolation
        the named defense; add a note referencing OWASP LLM01:2025 recommendation for
        semantic filtering and privilege reduction as the layered defense.

      ISSUE 2 — Validate LLM Outputs: wrong OWASP category number (STANDARDS MISMATCH)
        The Refs line cites "OWASP LLM02" for the output handling rule. In the OWASP
        LLM Top 10 2025 taxonomy, LLM02:2025 is "Sensitive Information Disclosure."
        Output handling (insufficient validation of LLM-generated outputs before
        downstream use) maps to LLM05:2025 "Improper Output Handling." The file
        appears to use the 2023 (v1.1) numbering where LLM02 was "Insecure Output
        Handling." All OWASP LLM refs in the file omit the year qualifier (:2025),
        making version ambiguity a file-wide issue.
        Fix required: update "OWASP LLM02" to "OWASP LLM05:2025" in the Validate
        LLM Outputs Refs line; add :2025 qualifier to all OWASP LLM refs in the file.

      ISSUE 3 — Secure Model Artifacts: AML.T0000 is not a valid ATLAS technique (REF ERROR)
        The Refs line cites "MITRE ATLAS AML.T0000" for the model theft / tampering
        rule. AML.T0000 does not exist in the MITRE ATLAS technique catalog (as of
        ATLAS v4, techniques begin at AML.T0006 "Active Scanning"). The intent appears
        to be model theft / exfiltration. The correct ATLAS technique for unauthorized
        model access / theft is AML.T0000 is likely a placeholder that was never
        resolved. The nearest applicable techniques are AML.T0040 (ML Model Inference
        API Access, covering extraction) and AML.T0035 (ML Artifact Collection, covering
        direct model file theft). MITRE ATLAS live pages returned 404 during this audit,
        so the exact current technique ID could not be confirmed from the live site;
        this finding is based on training-set knowledge of the ATLAS v4 taxonomy.
        Fix required: replace AML.T0000 with the verified ATLAS technique for model
        artifact theft/collection (AML.T0035 or current equivalent); confirm against
        the live ATLAS catalog before publishing.

      ISSUE 4 — Validate Model Inputs: broken JPEG magic byte check (CODE BUG)
        In the "Validate and Sanitize Model Inputs" Do example, the ImageInput validator
        checks: if not v[:8] in [b'\x89PNG', b'\xff\xd8\xff']. The JPEG magic bytes
        entry b'\xff\xd8\xff' is 3 bytes. v[:8] yields 8 bytes. A 3-byte bytes literal
        is never equal to an 8-byte slice, so the JPEG branch of the allowlist never
        matches. Every JPEG file will be rejected as having an invalid format, making
        the validator both broken (rejects valid JPEG) and incomplete (fails to
        demonstrate correct magic byte checking). The PNG entry b'\x89PNG' is also
        only 4 bytes, not the correct 8-byte PNG signature (b'\x89PNG\r\n\x1a\n').
        Fix required: use correct full magic byte sequences and match the slice length
        to the signature length (e.g., check v[:4] == b'\x89PNG' OR v[:3] == b'\xff\xd8\xff').

      Non-blocking observations (no status change):
      - Rule "Protect Sensitive Training Data" Do example: the apply_differential_privacy()
        method imports GaussianNB from diffprivlib but then calls dp_preprocessor.transform(),
        where dp_preprocessor is never defined. This is an undefined-variable bug that
        would raise NameError at runtime. The GaussianNB import is unused. The method
        body as written cannot execute. Fix: instantiate dp_preprocessor from a
        diffprivlib class (e.g., diffprivlib.models.GaussianNB) or use the pipeline
        pattern; remove the orphaned import.
      - Rule "Monitor for ML-Specific Attacks" Do example: _analyze_patterns() is called
        but never defined in the shown code. This is a stub, not a logic error, but
        it leaves the Do example non-runnable. Advisory: add a note that this is
        illustrative or provide a minimal implementation.
      - Rule "Isolate ML Inference Environments" Do example: binds Flask to
        app.run(host='10.0.0.1', ...) using a hardcoded RFC 1918 address. Production
        code should use an environment variable or 127.0.0.1; a hardcoded internal IP
        is deployment-environment-specific and will silently fail on a different host.
        Advisory only — does not affect security correctness of the example.
      - MITRE ATLAS live pages (atlas.mitre.org) returned 404 for all technique URLs
        tried during this audit. ATLAS technique name verification (AML.T0015,
        AML.T0020, AML.T0024, AML.T0040, AML.T0043) is based on training-set knowledge
        of the ATLAS v4 taxonomy and could not be independently confirmed from the live
        site. Reviewer notes this limitation; recommend a follow-up verification pass
        against the live ATLAS catalog when the site is accessible.
    issues_filed: []
