  - path: rules/backend/mlflow/CLAUDE.md
    status: failed
    reviewed_by: rocklambros
    reviewed_on: 2026-05-26
    notes: |
      Audited 4 rules. CWE IDs (22, 200, 311, 306, 319, 502, 532) are all valid and
      correctly mapped. MITRE ATLAS AML.T0010 (ML Supply Chain Compromise) is a real
      technique ID. Three blocking defects found.

      ISSUE 1 — Wrong OWASP LLM category for supply chain model loading (BLOCKING)
        Line 156 cites "OWASP LLM05" for the secure model registration/loading rule,
        with the Why text explaining "supply chain attacks through poisoned models."
        In OWASP LLM Top 10 2025, LLM05 = Improper Output Handling. Supply chain
        attacks on models map to LLM03:2025 (Supply Chain). LLM05 was "Insecure Output
        Handling" in the 2023 draft — this is a stale 2023 reference. Quick Reference
        table (line 566) repeats the same wrong mapping.
        Fix required: replace "OWASP LLM05" with "OWASP LLM03:2025" in both line 156
        and the Quick Reference table at line 566.

      ISSUE 2 — Deprecated MLflow 2.x stage API used throughout Do examples (BLOCKING)
        The Do examples in the first rule use three APIs deprecated since MLflow 2.9:
        (a) client.get_latest_versions(model_name) — line 84, deprecated; replaced by
            client.get_model_versions() or alias-based lookup.
        (b) model_version.current_stage — line 92, the stage concept is deprecated in
            2.x in favor of model aliases; current_stage returns None for alias-managed
            versions.
        (c) client.transition_model_version_stage() — lines 125-128 and 142, deprecated;
            replacement is client.set_registered_model_alias() / copy_model_version().
        Additionally, time.time() is called at line 121 but import time is never
        included in the code block's imports (lines 22-25), making the Do example fail
        with NameError at runtime.
        Fix required: replace deprecated stage API calls with MLflow 2.x alias-based
        equivalents (set_registered_model_alias, get_model_version_by_alias); add
        import time to the imports block.

      ISSUE 3 — mlflow.pyfunc.load_model() RCE risk absent from Do example (BLOCKING)
        Line 96 in the Do example calls mlflow.pyfunc.load_model(model_uri) without any
        warning comment. For most flavors (sklearn, keras, pytorch, custom pyfunc),
        load_model() deserializes pickle artifacts. Loading a model from an untrusted or
        unverified source is direct RCE — CVE-2023-30172 and follow-on advisories
        document active exploitation of unprotected MLflow tracking servers precisely
        because model artifacts are pickle-based. The Do example presents the load as
        safe after URI and stage validation, but the RCE vector remains unless the
        artifact store is fully access-controlled. The Don't example (line 134) warns
        about user-provided URIs but omits the underlying pickle deserialization risk
        that makes any load from an untrusted store dangerous regardless of URI origin.
        Fix required: add a comment above line 96 warning that load_model() is
        pickle-based for most flavors and that artifact store access control (not URI
        validation alone) is the required mitigation against RCE; reference the
        pickle/pyfunc risk in the Why section.

      Non-blocking observations (no status change):
      - Server rule (line 370): --app-name basic-auth is correctly shown, but no warning
        that unauthenticated mode (no --app-name flag) is the default in MLflow 2.x.
        CVE-2023-30172 and related advisories target exactly this default-open posture.
        An advisory note that the flag must be explicitly set would strengthen the rule.
      - Kubernetes example (line 506): image: mlflow-server:latest uses a mutable tag,
        contradicting the posture required by the containers/ rules. Advisory only.
    issues_filed: []

  - path: rules/backend/torchserve/CLAUDE.md
    status: failed
    reviewed_by: rocklambros
    reviewed_on: 2026-05-26
    audit_coverage: full
    rules_audited:
      - Validate MAR File Integrity
      - Implement Secure Custom Handlers
      - Secure Management API Access
      - Validate Inference Requests
    notes: |
      Audited all 4 rule sections. Three distinct blocking issues found. CWE IDs are
      all valid (CWE-502, CWE-94, CWE-78, CWE-22, CWE-306, CWE-918, CWE-400, CWE-770).
      Management API port-8081 binding (localhost-only, proxy auth, enable_model_api=false)
      is correctly addressed. Don't examples reflect real vulns throughout. Code parses
      as valid Python 3.x.

      ISSUE 1 — No deprecation/EOL notice for TorchServe (BLOCKING / CRITICAL)
        TorchServe was archived by AWS and the PyTorch project in 2024 due to mounting
        maintenance burden and an unresolved CVE backlog. The framework is no longer
        receiving security patches. The file contains no deprecation notice, no EOL
        callout, and no guidance toward maintained alternatives (Triton Inference Server,
        vLLM, Ray Serve, BentoML). A developer following this file as written would
        deploy an archived, unpatched serving framework in production. This is a material
        misleading omission, not a style issue.
        Fix required: add a prominent deprecation block at the top of the file stating
        that TorchServe is archived and unmaintained as of 2024; name at least two
        maintained alternatives; all rules should remain present for teams with existing
        TorchServe deployments but must be framed as legacy support only.

      ISSUE 2 — OWASP LLM refs use stale 2023 numbering (STANDARDS MISMATCH)
        Line 126 Refs: cites "OWASP LLM05" for the MAR file supply-chain rule.
          In the 2025 taxonomy, LLM05:2025 = "Improper Output Handling."
          Supply-chain / model-artifact integrity maps to LLM03:2025 (Supply Chain).
          Fix: change to "OWASP LLM03:2025 (Supply Chain)."
        Line 521 Refs: cites "OWASP LLM04" for resource-exhaustion inference DoS.
          In the 2025 taxonomy, LLM04:2025 = "Data and Model Poisoning."
          OWASP LLM04:2023 was "Model Denial of Service" -- the file is using the 2023
          numbering. Inference-layer DoS maps primarily to CWE-400/CWE-770 in the 2025
          taxonomy; at minimum, add the :2025 qualifier to avoid readers interpreting
          the number against the 2023 name map.
          Fix: update both refs to include :2025 qualifier; clarify that inference DoS
          maps to CWE-400/CWE-770 rather than to any 2025 LLM category directly.

      ISSUE 3 — MAR handler denylist presented as reliable security control (DEPRECATED MITIGATION)
        Lines 53-59: the Do example in "Validate MAR File Integrity" inspects custom
        handler Python source with a substring denylist:
          DANGEROUS_PATTERNS = ["subprocess", "os.system", "eval(", "exec(",
                                "__import__", "pickle.loads"]
          for pattern in DANGEROUS_PATTERNS:
              if pattern in content:
                  raise ValueError(...)
        This is trivially bypassed: an attacker encodes the import
        (e.g., __builtins__['ev'+'al']()), uses importlib.import_module("subprocess"),
        or aliases via getattr(). The check is presented without a caveat that it is
        a weak heuristic. Handler code executes as arbitrary Python inside the server
        process; static substring analysis against a short list provides negligible real
        security. The correct primary mitigation is cryptographic signing of MAR files
        (attestation that the handler was authored and reviewed by a trusted party)
        combined with OS-level execution sandboxing, not source scanning. The MITRE
        ATLAS AML.T0010 ref (supply-chain attack) is valid, but the Do mitigation does
        not match the threat it claims to address.
        Fix required: remove the denylist as the named primary control; replace with
        guidance to sign MAR files and verify the signature before loading; note that
        static source analysis is defense-in-depth only; add a note that handler code
        executes with full server privileges and real sandboxing requires OS-level
        controls (seccomp, containers, separate process).

      Non-blocking observations (no status change):
      - Pydantic @validator (line 435, InferenceRequest) is deprecated since Pydantic
        v2 (2023). Production code in 2026 should use @field_validator with
        mode='before'/'after'. Same advisory pattern seen in mcp-security.md.
      - model_name.isalnum() check (line 455) rejects valid model names with underscores
        and hyphens (e.g., "bert-base", "my_model_v2"). A regex whitelist
        (^[a-zA-Z0-9_-]+$) is less restrictive without opening injection. Advisory only.
      - Management API proxy logs api_key directly in the audit line
        (logging.info(f"Model unload: {model_name} by {api_key}"), line 360). Full API
        keys must not appear in logs; log a key prefix or key ID only. Advisory only.
      - MITRE ATLAS AML.T0010 (line 126) was unreachable from the live ATLAS site during
        this audit (same 404 pattern seen in prior audits). From training-set knowledge
        of ATLAS v4, AML.T0010 is plausibly "ML Supply Chain Compromise." Flagged as
        unverifiable from the live catalog, not definitively wrong.
    issues_filed: []

  - path: rules/backend/flask/CLAUDE.md
    status: failed
    reviewed_by: rocklambros
    reviewed_on: 2026-05-26
    notes: |
      Audited 8 rules (Configuration, Input Validation, XSS Prevention, Authentication,
      CSRF Protection, Database Security, Error Handling, File Uploads). Verified against
      Flask 3.0.3 and Werkzeug 3.0.4. CWE IDs (20, 79, 89, 209, 215, 352, 384, 434) are
      all current and correct. OWASP 2025 category refs (A01, A03, A04, A05, A07) are
      defensible and consistent with published 2025 mappings. SESSION_COOKIE_HTTPONLY,
      SESSION_COOKIE_SECURE, SESSION_COOKIE_SAMESITE all present in secure config example.
      Flask-Login session_protection='strong' is real and correct. Flask-WTF CSRF
      integration is accurate. SQLAlchemy parameterized query example is correct.
      werkzeug.utils.secure_filename usage is correct. Two blocking defects found.

      ISSUE 1 — session.regenerate() is a fictional API (BLOCKING)
        The Authentication rule Do example calls session.regenerate() immediately after
        login_user(user). This method does not exist in Flask 3.x or Flask-Login 0.6+.
        Flask's SecureCookieSession (confirmed in flask/sessions.py) exposes no
        regenerate() method. Executing this code raises AttributeError at runtime, making
        the Do example non-functional. The correct approach to guard against session
        fixation in Flask is to call session.clear() before setting authenticated state,
        or rely on Flask-Login's login_user() which rotates the session via its internal
        clear-and-repopulate path when session_protection is 'strong'. The comment
        "# Prevent session fixation" implies intent already handled by Flask-Login; the
        fabricated method call adds only a runtime crash.
        Fix required: remove session.regenerate() call; add a comment explaining that
        Flask-Login's login_user() handles session rotation when session_protection is
        'strong', or show the explicit session.clear() pattern if manual control is needed.

      ISSUE 2 — bleach is archived and no longer maintained (BLOCKING)
        The XSS Prevention rule Do example imports and uses bleach.clean() as the
        recommended HTML sanitizer. Mozilla archived the bleach project in 2023 and issued
        a deprecation notice advising users to migrate to maintained alternatives. bleach
        is no longer receiving security updates. Recommending an unmaintained
        security-critical library is a deprecated mitigation. The accepted replacement for
        server-side HTML sanitization in Python is nh3 (Python bindings for the Rust-based
        ammonia library), which provides equivalent tag allowlisting with active
        maintenance.
        Fix required: replace bleach import and bleach.clean() call with nh3.clean();
        update the package name in any implied dependency list.

      Non-blocking observations (no status change):
      - No Werkzeug password hashing rule present. generate_password_hash and
        check_password_hash are absent from the file. Werkzeug 3.x defaults to 'scrypt'
        as the hash method (not 'pbkdf2:sha256' as in older versions). Advisory only;
        the authentication rule defers to Flask-Login without showing credential storage.
      - OWASP A04:2025 (Insecure Design) for file uploads is an unusual mapping;
        A08:2025 (Software and Data Integrity Failures) or A03:2025 (Injection) are
        closer. Current mapping is not wrong enough to block but worth revisiting.
    issues_filed: []

  - path: rules/backend/modal/CLAUDE.md
    status: failed
    reviewed_by: rocklambros
    reviewed_on: 2026-05-26
    audit_coverage: full
    rules_audited:
      - Secure Modal Function Configuration
      - Secure Modal Secrets Handling
      - Harden Modal Container Images
      - Secure Modal Web Endpoints
      - Secure Modal Scheduled Functions
    notes: |
      Audited all 5 rule sections. Two blocking defects found: a pervasive deprecated
      API (modal.Stub replaced by modal.App) and a wrong OWASP LLM category number.
      No modal.Volume coverage (checklist item: no shared writable across untrusted
      callers) — absence rather than wrong rule; counted as advisory gap.

      MODAL API — modal.Stub deprecated, all Do examples broken (PERVASIVE / BLOCKING)
        All five rule sections use modal.Stub() and decorator patterns @stub.function(),
        @stub.cls(). The import line 'from modal import Image, Secret, Stub' appears in
        every Do block. modal.Stub was renamed to modal.App in Modal 0.60 (released
        late 2023). Current Modal 0.x exports modal.App, not modal.Stub; importing Stub
        raises ImportError on any Modal >= 0.60. Every Do example in the file fails at
        import time on a current Modal install. stub = modal.Stub(...) must become
        app = modal.App(...); @stub.function()/@stub.cls() become @app.function()/@app.cls();
        'from modal import ..., Stub' becomes 'from modal import ..., App'.
        Fix required: replace all modal.Stub() with modal.App(); update all decorator
        and assignment references throughout the file.

      ISSUE 1 — Function Configuration Refs: wrong OWASP LLM category (STANDARDS MISMATCH)
        Line 147 cites "OWASP LLM04" for the rule covering resource exhaustion (CWE-400)
        and unsafe model loading via trust_remote_code=True (CWE-502). In OWASP LLM Top
        10 2025, LLM04:2025 is "Data and Model Poisoning" — not resource limits or RCE
        via unsafe model loading. Resource exhaustion from unrestricted function invocation
        maps to LLM06:2025 (Excessive Agency); trust_remote_code=True RCE maps to
        LLM01:2025 (Prompt Injection / arbitrary code execution). No :2025 qualifier is
        present on any OWASP LLM citation in the file (file-wide pattern).
        Fix required: replace "OWASP LLM04" with "OWASP LLM06:2025" for the resource-
        exhaustion portion and add "OWASP LLM01:2025" for the trust_remote_code RCE
        risk; add :2025 qualifiers to all OWASP LLM refs.

      ISSUE 2 — Container Image Do example: apt_install without version pin (SELF-CONTRADICTION)
        Line 282 shows .apt_install("libgomp1") with no version constraint. The container
        security checklist requires pinned versions for all package installs. The same Do
        block immediately below pins all pip packages to exact versions (torch==2.0.1,
        numpy==1.24.0), creating a self-contradiction: apt packages float while pip
        packages are pinned. Modal's .apt_install() calls apt-get install; without a
        version string (e.g., "libgomp1=12.3.0-1") every image rebuild pulls the latest
        available version from the debian repository, undermining reproducibility and
        introducing supply-chain risk.
        Fix required: pin the apt package version in .apt_install(), e.g.
        .apt_install("libgomp1=12.3.0-1"), and add a comment noting version can be
        found with 'apt-cache show libgomp1'.

      Non-blocking observations (no status change):
      - modal.Volume absent: No rule covers modal.Volume access controls. The checklist
        item "no shared writable across untrusted callers" is unaddressed. Advisory: add
        a Volume security rule covering per-caller namespace isolation and read-only
        mounts for shared model artifacts.
      - Web endpoint auth token comparison (line 403): 'if token not in valid_keys' uses
        plain string comparison. hmac.compare_digest() is preferred to prevent timing
        side-channel leaks. Advisory only.
      - @modal.method() per-method authz (line 105): Do example validates prompt length
        but performs no caller identity check at the method level. Advisory only.
      - GPU type string "T4" (lines 48, 89): valid in current Modal alongside the object
        form modal.gpu.T4(). No issue.
      - All CWE IDs valid: CWE-400, CWE-502, CWE-798, CWE-532, CWE-250, CWE-269,
        CWE-306, CWE-770, CWE-94. OWASP web-app refs A07:2025, A05:2025, A01:2025
        are correct 2025 category mappings.
      - modal.Secret.from_name() used consistently throughout Do examples; no inline
        keys anywhere. Correct pattern.
      - All Do examples include explicit timeout= and concurrency_limit= values.
        Cost caps adequately covered.
    issues_filed: []

  - path: rules/backend/ray-serve/CLAUDE.md
    status: failed
    reviewed_by: rocklambros
    reviewed_on: 2026-05-26
    notes: |
      Audited 5 rules. Ray 2.x API syntax is valid throughout: AutoscalingConfig
      parameters (min_replicas, max_replicas, target_num_ongoing_requests_per_replica,
      upscale_delay_s, downscale_delay_s, metrics_interval_s, look_back_period_s),
      serve.deployment decorator, serve.run(), serve.ingress(), .bind() pattern,
      HTTPOptions with host/port/request_timeout_s, and serve.start() with namespace
      and detached are all current Ray 2.x API. All CWE IDs (20, 94, 200, 209, 269,
      400, 502, 770) are valid. Four blocking defects found.

      ISSUE 1 — OWASP LLM taxonomy mismatch: LLM04 used for DoS/resource-exhaustion
      context (STANDARDS ERROR / BLOCKING)
        Lines 133 and 607 cite "OWASP LLM04" as a reference for resource exhaustion
        and unvalidated data flows. In the OWASP LLM Top 10 2025 taxonomy, LLM04 is
        "Data and Model Poisoning" not Denial of Service. The 2023 taxonomy had LLM04
        as "Model Denial of Service" but the 2025 edition renumbered it; DoS moved to
        LLM10:2025 (Unbounded Consumption). Using bare "OWASP LLM04" without a year
        qualifier silently points to the wrong category in the current standard.
        Fix required: replace "OWASP LLM04" with "OWASP LLM10:2025 (Unbounded
        Consumption)" on lines 133 and 607; add :2025 year qualifier throughout.

      ISSUE 2 — OWASP LLM taxonomy mismatch: LLM05 used for serialization/RCE
      context (STANDARDS ERROR / BLOCKING)
        Line 374 cites "OWASP LLM05" for the pickle/deserialization RCE rule. In the
        OWASP LLM Top 10 2025 taxonomy, LLM05 is "Improper Output Handling." The
        pickle deserialization RCE vector is an infrastructure supply-chain risk not
        mapped to LLM05:2025. The closest 2025 mapping is LLM04:2025 (Data and Model
        Poisoning) or no LLM ref (CWE-502 and CWE-94 alone are sufficient).
        Fix required: remove bare "OWASP LLM05" from line 374 Refs. If an LLM ref is
        desired, cite LLM04:2025.

      ISSUE 3 — Ray dashboard port 8265 not covered (COVERAGE GAP / BLOCKING)
        The audit checklist requires that Ray dashboard exposure on port 8265 be
        addressed: the dashboard is unauthenticated by default and must require a
        token in production. No rule in the file covers this. An attacker with
        network access to port 8265 can inspect actors, kill jobs, and exfiltrate
        task metadata without credentials in a default Ray cluster deployment.
        The correct mitigations are --dashboard-token (Ray CLI) or the
        RAY_DASHBOARD_TOKEN env var, combined with network-layer controls blocking
        8265 from untrusted networks.
        Fix required: add a strict rule covering Ray dashboard authentication showing
        token configuration. Don't example: serve.start() without dashboard token
        on a non-loopback interface.

      ISSUE 4 — runtime_env pip installs from untrusted sources not covered
      (COVERAGE GAP / BLOCKING)
        The audit checklist requires that runtime_env pip installs from untrusted
        sources be addressed. Ray's runtime_env feature allows specifying arbitrary
        pip packages at deployment time; an attacker who controls runtime_env
        configuration can install a malicious package that executes code in every
        worker at startup, equivalent to RCE across all replicas. No rule in the
        file addresses this vector. Ray uses cloudpickle internally for task/actor
        serialization; the serialization rule correctly warns about pickle but does
        not name cloudpickle or its role as Ray's internal serializer, and does not
        address the runtime_env supply-chain vector.
        Fix required: add a strict rule covering runtime_env security: require pinned
        package versions with hashes, restrict pip index to an internal registry or
        --no-index with a local wheelhouse, prohibit git+https:// or VCS refs
        without commit SHA pinning. Name cloudpickle as Ray's internal serializer
        and note that untrusted task code submitted to Ray actors is RCE.

      Non-blocking observations (no status change):
      - Inter-actor trust is not covered. When multiple deployments communicate via
        .remote() handles, a compromised replica can call any handle it holds a
        reference to without authentication. Advisory: note in the composition rule
        that handle references are trust boundaries and callee deployments should
        validate caller identity.
      - The multi-application isolation rule shows ray_actor_options with a "namespace"
        key (lines 411, 422). ray_actor_options does not accept a "namespace" key;
        namespace is a top-level argument to ray.init() or serve.start(), not a
        per-actor resource option. The key is silently ignored at runtime.
        Non-blocking because the surrounding serve.start(namespace=...) pattern is
        correct; the stray key in ray_actor_options is a misleading artifact.
    issues_filed: []

  - path: rules/backend/transformers/CLAUDE.md
    status: failed
    reviewed_by: rocklambros
    reviewed_on: 2026-05-26
    audit_coverage: full
    rules_audited:
      - Disable Remote Code Execution
      - Verify Model Integrity
      - Validate Tokenizer Inputs
      - Validate Model Outputs
      - Secure Training Data and Process
      - Secure Hugging Face Hub Authentication
    notes: |
      Audited all 6 rule sections. Transformers 4.x API usage is mostly correct:
      use_safetensors=True (from_pretrained, >= 4.31), safe_serialization=True
      (save_pretrained, >= 4.30), token= kwarg (replaces deprecated use_auth_token=,
      >= 4.31), revision= for SHA pinning, truncation/padding args -- all valid. CWE IDs
      all correct: CWE-502, CWE-494, CWE-400, CWE-20, CWE-200, CWE-798, CWE-532.
      OWASP A07:2025 for Hub auth rule is correct. Two blocking defects found.

      OWASP LLM 2023->2025 NUMBERING: YES -- applies throughout this file.
        All four OWASP LLM refs omit the :2025 qualifier and use 2023 numbers.
        LLM05 (supply chain / trust_remote_code) is LLM03:2025 in the 2025 taxonomy --
        the number is wrong. LLM04 (tokenizer validation / output handling) maps to
        different 2025 categories: the tokenizer DoS rule is closest to LLM10:2025
        (Unbounded Consumption); the output validation rule is closest to LLM05:2025
        (Improper Output Handling). All LLM refs need :2025 qualifier and number
        correction as a minimum.

      ISSUE 1 -- OWASP LLM refs use 2023 numbers, no :2025 qualifier (STANDARDS MISMATCH / BLOCKING)
        Lines 75, 139, 205, 277, 356, 424 cite OWASP LLM04 and LLM05 without :2025
        qualifier. In the 2025 taxonomy:
          LLM05:2023 (Supply Chain Vulnerabilities) -> LLM03:2025 -- number changed.
            Affected rules: Disable Remote Code Execution (line 75), Verify Model
            Integrity (line 139), Secure Training Process (line 356).
          LLM04:2023 (Model Denial of Service) -> LLM10:2025 (Unbounded Consumption)
            for the tokenizer DoS rule (line 205).
          The Validate Model Outputs rule (line 277) covers improper output handling
            -> LLM05:2025 (Improper Output Handling) is the correct 2025 ref.
        Fix required: update supply-chain refs to LLM03:2025; tokenizer rule to
        LLM10:2025; output validation rule to LLM05:2025; add :2025 qualifier throughout.

      ISSUE 2 -- verify_model() info.security_status is not a real ModelInfo field (DEAD GUARD / BLOCKING)
        Lines 95-97 in the Verify Model Integrity Do example check:
          if hasattr(info, 'security_status'):
              if info.security_status == 'unsafe':
                  raise ValueError(...)
        The huggingface_hub ModelInfo dataclass (all released versions) does not have a
        security_status attribute. hasattr() always returns False; the guard is
        permanently bypassed for every model. A developer copying this example will
        believe the security_status check is an active mitigation when it is dead code
        that never triggers. No version of huggingface_hub exposes this field in the
        ModelInfo response. The correct approach is to check info.tags for known
        community-applied tags or inspect info.disabled.
        Fix required: remove the info.security_status block or replace it with a
        check against info.tags and info.disabled; document that HF Hub does not
        provide a single security_status signal and that allowlist + tag review is
        the available API.

      Non-blocking observations (no status change):
      - AML.T0010 (line 75, trust_remote_code RCE): ATLAS live site returned 404 in all
        prior audits in this project. From training-set knowledge AML.T0010 is not a
        confirmed technique ID in ATLAS v4 (AML.T0011 = User Execution via malicious
        artifact is a closer fit for the trust_remote_code RCE scenario). Cannot confirm
        or refute from the live catalog. Recommend replacing with AML.T0011 or verifying
        against the live ATLAS catalog before publishing.
      - AML.T0024 (line 277, logit leakage / inference exfiltration): plausible as
        Exfiltration via ML Inference API from training knowledge; same 404 caveat.
      - AML.T0020 (lines 139, 356, data poisoning): confirmed as Poison Training Data
        in ATLAS v4 -- correct use.
      - The save_pretrained(path) Don't example comments 'Default may use pickle.'
        In transformers >= 4.37 the default switches to safetensors when the safetensors
        package is installed. The comment is inaccurate for current transformers; update
        to note that safe_serialization=True guarantees safetensors regardless of
        environment.
      - torch.load() coverage is conceptually correct but does not mention the
        weights_only=True partial mitigation added in PyTorch 2.0. File correctly steers
        toward safetensors; omission of weights_only is a coverage gap, not a contradiction.
      - PEFT/LoRA fine-tuning concerns (adapter weight leakage, poisoning via adapter
        injection) are not covered. Advisory: add a PEFT/LoRA subsection.
      - pipeline() API injection risks are not addressed. Advisory: add a rule covering
        trust_remote_code in pipeline() and output sanitization for pipeline results.
      - Untrusted tokenizer.json source check is not explicitly addressed; the
        trust_remote_code=False coverage is correct but does not discuss the
        tokenizer.json attack surface independently.
    issues_filed: []
