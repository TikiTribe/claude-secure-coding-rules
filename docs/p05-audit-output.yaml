  - path: rules/iac/pulumi/CLAUDE.md
    status: failed
    reviewed_by: rocklambros
    reviewed_on: 2026-05-25
    audit_coverage: full
    rules_audited:
      - Rule 1: Stack Secrets Encryption
      - Rule 2: Config.requireSecret for Sensitive Values
      - Rule 3: CrossGuard Policy Packs
      - Rule 4: Automation API Security
      - Rule 5: State Backend Security
      - Rule 6: Provider Configuration Security
      - Rule 7: Resource Options (protect, retainOnDelete)
      - Rule 8: Stack References Security
      - Rule 9: Dynamic Providers Validation
      - Rule 10: ESC Security
    notes: |
      Audited all 10 rule sections. Four distinct blocking issues found; three are
      critical compile/runtime errors (missing imports), one is a wrong import path.
      No OWASP LLM numbering problem — this file uses CWE and NIST SP 800-53 refs
      only, all correctly cited. No inline credentials in Do examples; all hardcoded
      values appear correctly in Don't examples with explicit VULNERABLE labels.
      Secret-handling patterns (requireSecret / require_secret / RequireSecret /
      pulumi.secret / fn::secret) are used consistently throughout Do examples.
      CrossGuard policy SDK usage in TypeScript and Python matches current @pulumi/policy
      v0.x API. ESC environment definition syntax (fn::open::aws-secrets,
      fn::open::vault-secrets, fn::secret) is correct per Pulumi ESC documentation.
      Provider plugin signing is not covered by any rule (noted as a coverage gap).

      ISSUE 1 — Rule 6 Go example: s3.NewBucket called without s3 import (CODE BUG / CRITICAL)
        Line 953: s3.NewBucket(ctx, "my-bucket", &s3.BucketArgs{}, pulumi.Provider(provider))
        The import block (lines 933-936) imports only:
          "github.com/pulumi/pulumi-aws/sdk/v6/go/aws"
          "github.com/pulumi/pulumi/sdk/v3/go/pulumi"
        The s3 sub-package "github.com/pulumi/pulumi-aws/sdk/v6/go/aws/s3" is never
        imported. This is a compile-time error: undefined: s3. A developer copying
        this example to illustrate provider role assumption with an S3 bucket gets a
        build failure immediately.
        Fix required: add "github.com/pulumi/pulumi-aws/sdk/v6/go/aws/s3" to the
        import block.

      ISSUE 2 — Rule 7 Python example: aws.ec2.Vpc referenced without aws import (CODE BUG / CRITICAL)
        Line 1081: vpc = aws.ec2.Vpc("production-vpc", cidr_block="10.0.0.0/16", ...)
        The Python import block (line 1061) is: from pulumi_aws import rds, s3, kms
        The name 'aws' is not defined in this scope. This raises NameError: name 'aws'
        is not defined at runtime. The rds.Instance protect example above it (line 1066)
        is correct and importable; only the retainOnDelete Vpc example is broken.
        Fix required: replace aws.ec2.Vpc with ec2.Vpc and add 'from pulumi_aws import
        ec2' to the import block, or use 'import pulumi_aws as aws' instead of the
        selective from-import for the whole block.

      ISSUE 3 — Rule 6 Python example: ProviderAssumeRoleArgs used without import (CODE BUG)
        Line 895: assume_role=ProviderAssumeRoleArgs(role_arn=..., session_name=..., external_id=...)
        The import block (line 888) is: from pulumi_aws import Provider, s3
        ProviderAssumeRoleArgs is not imported. This raises NameError: name
        'ProviderAssumeRoleArgs' is not defined when the provider is instantiated.
        In the pulumi_aws SDK, ProviderAssumeRoleArgs is exported from the top-level
        package. The correct import is:
          from pulumi_aws import Provider, ProviderAssumeRoleArgs
        Fix required: add ProviderAssumeRoleArgs to the from-import line.

      ISSUE 4 — Rule 4 TypeScript Automation API: import shadows main SDK (CODE BUG / CRITICAL)
        Line 489: import * as pulumi from "@pulumi/pulumi/automation";
        This binds the automation sub-module to the name 'pulumi', making the identifier
        'pulumi' refer to the automation module rather than the main @pulumi/pulumi SDK.
        Any code in the same module scope that needs main SDK exports (pulumi.Config,
        pulumi.Output, pulumi.secret, pulumi.interpolate) would get the automation
        module's exports instead and fail. The outer deployInfrastructure() function
        works because it only uses pulumi.LocalWorkspace (which IS exported from the
        automation sub-module), but the import pattern is incorrect per the official
        Pulumi Automation API documentation, which shows the two-import pattern:
          import * as pulumi from "@pulumi/pulumi";
          import { LocalWorkspace, LocalWorkspaceOptions, ConfigValue } from "@pulumi/pulumi/automation";
        The current single import precludes correct usage of other Pulumi SDK features
        in the same file and is a portability defect that will cause confusion in practice.
        Fix required: split into the two-import pattern shown above and replace
        pulumi.LocalWorkspace with LocalWorkspace throughout the Automation API example.

      Non-blocking observations (no status change):
      - Rule 2 TypeScript: finalSnapshotIdentifier uses Date.now() (line 160).
        Date.now() at program evaluation time means each 'pulumi up' invocation produces
        a different snapshot identifier. Advisory: use pulumi.getStack() + static suffix
        for a deterministic but stack-scoped value, e.g.:
          finalSnapshotIdentifier: pulumi.interpolate`production-db-final-${pulumi.getStack()}`
      - Provider plugin signing coverage gap: the audit task listed provider plugin
        signing as a target area. No rule covers Pulumi provider plugin checksum
        verification or supply chain integrity of provider binaries. A future Rule 11
        covering plugin signing and --exact-version install patterns is warranted.
        Advisory only.
      - Rule 3 CrossGuard Python: args.resource_type string "aws:s3/bucket:Bucket" targets
        the classic Bucket resource. The current recommended resource is BucketV2
        (type "aws:s3/bucketv2:BucketV2"). The TypeScript example already references
        aws.s3.BucketVersioningV2 correctly; the Python example's type-string check
        lags behind. Advisory for future update.
      - Rule 3 CrossGuard: org-wide policy enforcement requires Pulumi Cloud Business
        or Enterprise. The file shows the commands (pulumi policy publish / enable)
        but does not note this tier requirement. Advisory.
    issues_filed: []

  - path: rules/iac/terraform/CLAUDE.md
    status: failed
    reviewed_by: rocklambros
    reviewed_on: 2026-05-25
    notes: |
      Audited all 12 rules plus the Additional Best Practices section.
      Two CRITICAL defects, one HIGH supply-chain defect, four WARNINGs, and two coverage
      gaps identified.

      ISSUE 1 — Rule 10 backend key: variable interpolation in backend config block (CRITICAL)
        Line 1259: key = "${var.environment}/infrastructure/terraform.tfstate"
        Terraform backend blocks explicitly prohibit variable references and expressions.
        terraform init fails immediately with: "Variables not allowed; Variables may not be
        used here." This is a broken Do example that cannot run. The correct pattern for
        per-environment state isolation is either (a) use workspace_key_prefix with
        terraform.workspace (already shown in the first Do block), or (b) use entirely
        separate root module directories with hardcoded keys in each directory's backend
        configuration, or (c) pass the key via -backend-config on the CLI.
        Fix required: replace the interpolated key with a comment explaining that backend
        keys must be literals and show the -backend-config flag pattern as an alternative.

      ISSUE 2 — Rule 1 GCS backend: wrong attribute for CMEK (CRITICAL)
        Line 123: encryption_key = "projects/my-project/locations/us/keyRings/terraform/cryptoKeys/state-key"
        The code comment says "GCS with Customer-Managed Encryption Key (CMEK)" and the
        Why text describes CMEK, but the attribute used is encryption_key. In the Terraform
        GCS backend, encryption_key expects a 32-byte base64-encoded AES-256 Customer-Supplied
        Encryption Key (CSEK), not a Cloud KMS key resource path. Supplying a KMS key path
        as this value will fail authentication at runtime because Terraform passes it to GCS
        as a raw CSEK header. The correct backend attribute for CMEK-backed GCS state is not
        available as a direct backend argument; CMEK on the GCS bucket itself is configured
        via google_storage_bucket.encryption.default_kms_key_name (already shown in the
        bucket resource below). The backend block encryption_key field should either be
        removed (if relying on bucket-level CMEK) or replaced with a genuine base64 CSEK
        with an appropriate comment distinguishing CSEK from CMEK.
        Fix required: remove encryption_key from the backend block or replace it with a
        genuine CSEK example; add an explanatory comment clarifying that bucket-level CMEK
        is configured on the google_storage_bucket resource, not in the backend block.

      ISSUE 3 — Rule 12: checkov-action pinned to @master branch (HIGH — supply chain risk)
        Lines 1454, 1545, 1551: uses: bridgecrewio/checkov-action@master
        Pinning a GitHub Action to a mutable branch reference (@master) means any push to
        that branch is immediately trusted by CI without review. This directly contradicts
        the supply chain guidance in Rule 3 (Provider Version Pinning) and Rule 4 (Module
        Source Validation) which prohibit branch references. The action should be pinned to
        a specific version tag (e.g., @v12) or, for maximum supply-chain hardening, a full
        commit SHA.
        Fix required: replace @master with a pinned version tag (minimum) or full SHA pin.

      ISSUE 4 — Rule 1 S3 backend: deprecated acl= argument (WARNING)
        Line 26: acl = "private"
        The acl argument was removed from the Terraform S3 backend in Terraform 1.4.0.
        The file requires Terraform >= 1.5.0 (line 399), making this argument invalid in
        any configuration that follows the version requirement in Rule 3. Running
        terraform init with this backend block will emit a warning (and in some Terraform
        versions, an error). The correct way to enforce private access on the state bucket
        is via the aws_s3_bucket_public_access_block resource (already present on lines
        65-72), not the backend acl argument.
        Fix required: remove acl = "private" from the S3 backend block; add a comment
        pointing to the aws_s3_bucket_public_access_block resource as the correct control.

      ISSUE 5 — Rule 9: timestamp() in final_snapshot_identifier causes perpetual plan diffs (WARNING)
        Line 1097: final_snapshot_identifier = "production-database-final-${formatdate("YYYY-MM-DD-hhmm", timestamp())}"
        The timestamp() function is evaluated at plan time, not apply time, and produces a
        different value on every terraform plan run. This means terraform plan will always
        show a change to final_snapshot_identifier even when nothing else has changed,
        creating alert fatigue and undermining the plan-review discipline described in
        Rule 11. The correct pattern is to use a static suffix (e.g., the environment name
        or a Terraform variable) or to accept the identifier as a variable input when a
        destroy is explicitly intended.
        Fix required: replace timestamp() with a static value or variable; add a comment
        explaining why dynamic identifiers should not be used in static resource attributes.

      ISSUE 6 — Rule 12: tfsec-action is archived (WARNING)
        Line 1447: uses: aquasecurity/tfsec-action@v1.0.0
        The aquasecurity/tfsec-action GitHub Action repository was archived in 2023.
        Aqua Security consolidated scanning into trivy (aquasecurity/trivy-action), which
        subsumes tfsec's Terraform checks. New CI pipelines that follow the Do example
        will pin to an unmaintained action with no future security updates.
        Fix required: replace tfsec-action with trivy-action configured for Terraform
        scanning (--scanners misconfig, --iac-types terraform).

      ISSUE 7 — Rule 3: ~> 2.24 missing clarifying comment (WARNING)
        Line 416: version = "~> 2.24"
        The adjacent ~> 5.31.0 example correctly comments "Allow patch updates only."
        However, ~> X.Y (two-component form) has different semantics: it allows minor
        AND patch updates (>= 2.24.0, < 3.0.0), not just patch updates. The missing
        comment implies both forms behave identically, which will mislead practitioners
        into believing they have tighter pinning than they do.
        Fix required: add "# Allow minor and patch updates (>= 2.24.0, < 3.0.0)" comment
        to make the semantic difference between ~> X.Y and ~> X.Y.Z explicit.

      ISSUE 8 — Rule 10: $Latest in launch_template version (WARNING)
        Line 1249: version = "$Latest"
        Using $Latest in a launch template reference means the ASG silently picks up any
        new launch template version, including ones pushed by an attacker with EC2 write
        access. This contradicts the rule's own intent of environment isolation and
        controlled change. The Terraform resource also owns the launch template, so the
        latest numeric version is available as aws_launch_template.app.latest_version.
        Fix required: replace "$Latest" with aws_launch_template.app.latest_version and
        add a comment explaining why $Latest is a security anti-pattern in IaC.

      COVERAGE GAP 1 — No Sentinel policy rule (COVERAGE GAP)
        The task specification calls out HashiCorp Sentinel policy patterns as a required
        coverage area. The file contains no Sentinel examples, no rego/Sentinel policy
        block, and no reference to OPA (Open Policy Agent) as an alternative. Teams using
        Terraform Cloud or Terraform Enterprise rely on Sentinel (or OPA via the tfplan/v2
        import) for pre-apply policy gates, blast-radius limits, and resource allow-lists.
        Recommendation: add Rule 13 covering Sentinel/OPA policy patterns with examples of
        resource-type restrictions, required-tag enforcement, and CIDR allow-listing.

      COVERAGE GAP 2 — IAM for the Terraform service account not explicitly addressed (COVERAGE GAP)
        Rule 7 covers IAM for resources provisioned by Terraform (application IAM roles and
        policies). Neither Rule 7 nor any other rule addresses the IAM policy attached to
        the Terraform execution identity itself: what permissions the CI runner or human
        operator needs to run terraform plan and terraform apply, and how to scope that
        down using permission boundaries or SCPs. This distinction matters because the
        Terraform role has broad state-bucket and provisioning rights that must be
        independently hardened.
        Recommendation: add explicit guidance for the Terraform service account IAM scope
        with a worked example that separates plan-only permissions from apply permissions,
        and uses a permission boundary to cap the blast radius.

      Non-blocking observations:
      - Rule 5 output "database_connection_string" embeds the full connection string
        (including password) as a sensitive output. While marking it sensitive = true is
        correct, the Why section does not warn that the value still exists in plaintext in
        the state file even though it is masked in CLI output. A comment noting this
        limitation would improve practitioner understanding.
      - Rule 12 pre-commit rev v1.83.5 (line 1503) is significantly behind the current
        v1.96+ release series. Not a security defect but recommend updating to avoid
        using hooks with known issues that were fixed in later versions.
      - Rule 2 Don't example shows real-looking AWS access key format (AKIAIOSFODNN7EXAMPLE)
        and secret key pattern. While these are the canonical AWS fake credential examples
        from their own documentation, some secret scanning tools (gitleaks) will still
        flag them as potential credentials. This is acceptable for educational material
        but worth noting.
